spring:
  application:
    name: feuerwehr-manager

  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:feuerwehr_manager}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Europe/Berlin&characterEncoding=utf8
    username: ${MYSQL_USER:ff}
    password: ${MYSQL_PASSWORD:ffsecret}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc.time_zone: Europe/Berlin

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080
  servlet:
    session:
      timeout: 8h
      cookie:
        http-only: true
        same-site: lax

management:
  endpoints:
    web:
      exposure:
        include: health,info

feuerwehr:
  security:
    bootstrap-admin-username: ${FEUERWEHR_BOOTSTRAP_ADMIN_USERNAME:admin}
    bootstrap-admin-password: ${FEUERWEHR_BOOTSTRAP_ADMIN_PASSWORD:changeme}
    bootstrap-admin-display-name: Administrator
    session-timeout-minutes: 480
    rfid-api-enabled: ${FEUERWEHR_RFID_API_ENABLED:true}
  dsgvo:
    audit-retention-days: ${FEUERWEHR_AUDIT_RETENTION_DAYS:90}
    audit-salt: ${FEUERWEHR_AUDIT_SALT:bitte-in-produktion-aendern}
    audit-cleanup-enabled: true
    audit-cleanup-cron: "0 0 3 * * *"
  divera:
    # Host vor „docker compose up“: export FEUERWEHR_DIVERA_POLL_ENABLED=true (siehe docs/SCHRITT-FUER-SCHRITT.md)
    poll-enabled: ${FEUERWEHR_DIVERA_POLL_ENABLED:false}
    poll-interval-ms: 120000
