<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <title>Feuerwehr-Manager</title>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<header class="bar">
  <h1>Feuerwehr-Manager</h1>
  <div style="display:flex;align-items:center;gap:0.75rem;flex-wrap:wrap;">
  <span class="hint" style="color:#94a3b8;margin:0;" th:if="${currentUser != null}" th:text="${currentUser.displayName}">Nutzer</span>
  <form method="post" th:action="@{/logout}" style="margin:0;">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    <button type="submit" class="btn btn-secondary" style="min-height:40px;font-size:0.9rem;">Abmelden</button>
  </form>
  <form method="get" action="/" style="display:flex;align-items:center;gap:0.5rem;margin:0;">
    <label for="unit" class="sr-only">Einheit</label>
    <select class="unit-select" id="unit" name="unit" onchange="this.form.submit()">
      <option th:each="u : ${units}"
              th:value="${u.id}"
              th:selected="${u.id == unitId}"
              th:text="${u.name}">Einheit</option>
    </select>
  </form>
  </div>
</header>

<main>
  <p class="hint">Einheit: <strong th:text="${currentUnitName}">—</strong> · Layout Variante D</p>

  <nav class="tile-grid" aria-label="Module">
    <a class="tile active" href="#"><span class="icon">🚒</span>Reservierungen</a>
    <span class="tile muted"><span class="icon">🛡️</span>Atemschutz</span>
    <span class="tile muted"><span class="icon">👥</span>Personal</span>
    <span class="tile muted"><span class="icon">📋</span>Berichte</span>
    <span class="tile muted"><span class="icon">📊</span>Auswertung</span>
    <a class="tile" th:href="@{/settings(unit=${unitId})}"><span class="icon">⚙️</span>Einstellungen</a>
  </nav>

  <section class="list" aria-labelledby="divera-h">
    <h2 id="divera-h">Divera – aktuelle Einsätze</h2>
    <div class="list-row" th:if="${!divera.success}">
      <span th:text="${divera.message}">Fehler</span>
      <span class="badge inactive">Prüfen</span>
    </div>
    <th:block th:if="${divera.success}">
      <div class="list-row" th:if="${#lists.isEmpty(divera.alarms)}">
        <span>Keine Alarme geliefert (oder Liste leer).</span>
        <span class="badge active">OK</span>
      </div>
      <div class="list-row" th:each="a : ${divera.alarms}">
        <span>
          <strong th:text="${a.title}">Titel</strong>
          <span th:if="${a.address != null and !#strings.isEmpty(a.address)}"> · </span>
          <span th:text="${a.address}">Adresse</span>
          <span class="hint" th:if="${a.closed}" style="display:inline;margin:0;"> (geschlossen)</span>
        </span>
        <span class="badge active" th:text="${a.id}">ID</span>
      </div>
    </th:block>
  </section>

  <p class="hint">JSON: <code th:text="'/api/v1/units/' + ${unitId} + '/divera/alarms'">/api/…</code></p>
</main>
</body>
</html>
