<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout('Einstellungen', ~{::main})}">
<main>
  <div class="page-header">
    <div>
      <h2>Einstellungen</h2>
      <p>Dein Konto und die Darstellung</p>
    </div>
  </div>

  <div th:replace="~{fragments/testmode-banner :: banner}"></div>
  <div class="ok" th:if="${saved}" th:text="${message} ?: 'Gespeichert.'">OK</div>
  <div class="err" th:if="${error}" th:text="${error}">Fehler</div>

  <div class="card">
    <div class="card__header">Darstellung</div>
    <div class="card__body">
      <p class="hint">Helles oder dunkles Farbschema (wird im Browser gespeichert).</p>
      <div class="btn-group" role="group" aria-label="Design">
        <button type="button" class="btn btn--outline" data-theme-choice="light">☀️ Helles Design</button>
        <button type="button" class="btn btn--outline" data-theme-choice="dark">🌙 Dunkles Design</button>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card__header">Konto</div>
    <div class="card__body">
      <form method="post" th:action="@{/settings/password}" class="form-grid">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div class="form-group">
          <label for="currentPassword">Aktuelles Passwort</label>
          <input id="currentPassword" name="currentPassword" type="password" required autocomplete="current-password"/>
        </div>
        <div class="form-group">
          <label for="newPassword">Neues Passwort</label>
          <input id="newPassword" name="newPassword" type="password" required th:minlength="${minPasswordLength}" autocomplete="new-password"/>
        </div>
        <div class="form-group">
          <label for="newPasswordConfirm">Neues Passwort wiederholen</label>
          <input id="newPasswordConfirm" name="newPasswordConfirm" type="password" required th:minlength="${minPasswordLength}" autocomplete="new-password"/>
        </div>
        <div class="form-group form-group--submit">
          <button type="submit" class="btn btn--primary">Passwort speichern</button>
        </div>
      </form>
    </div>
  </div>

  <p class="hint" th:if="${isAdmin}">
    Verwaltung von Einheit, Modulen und Schnittstellen:
    <a th:href="@{/admin(scope='einheit', tab='module', unit=${unitId})}">Adminpanel öffnen</a>
  </p>
</main>
</html>
