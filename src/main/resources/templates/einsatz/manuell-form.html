<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(${pageTitle}, ~{::main})}">
<main class="manual-alarm-page">
  <div class="page-header page-header--toolbar">
    <div>
      <h2 th:text="${pageTitle}">Einsatz anlegen</h2>
      <p th:text="${pageSubtitle}">Einheit</p>
    </div>
    <div class="toolbar-actions">
      <a class="btn btn--outline btn--sm" th:href="@{/(unit=${unitId})}">← Startseite</a>
    </div>
  </div>

  <div th:replace="~{fragments/flash-messages :: alerts}"></div>

  <form method="post" class="manual-alarm-form" id="manual-alarm-form"
        th:action="${editMode} ? @{/einsatz/manuell/{id}(id=${draftId})} : @{/einsatz/manuell}"
        th:attr="data-edit-mode=${editMode}">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    <input type="hidden" name="unit" th:value="${unitId}"/>

    <div class="card">
      <div class="card__header">Einsatzart</div>
      <div class="card__body manual-alarm-form__section">
        <label class="radio-inline">
          <input type="radio" name="exercise" value="false"
                 th:checked="${editMode ? !alarm.exercise : true}"/>
          Realer Einsatz
        </label>
        <label class="radio-inline">
          <input type="radio" name="exercise" value="true"
                 th:checked="${editMode ? alarm.exercise : false}"/>
          Übung
        </label>
      </div>
    </div>

    <div class="card">
      <div class="card__header">Einsatz</div>
      <div class="card__body manual-alarm-form__section">
        <div class="form-group">
          <label for="alarmNumber">Einsatznummer</label>
          <input id="alarmNumber" name="alarmNumber" type="text" maxlength="64" class="field"
                 th:value="${editMode ? alarm.alarmNumber : suggestedAlarmNumber}"
                 th:attr="data-unit-id=${unitId}"/>
          <p class="hint" th:if="${!editMode}">Automatisch vorgeschlagen — anpassbar.</p>
        </div>
        <div class="form-group">
          <label for="title">Stichwort <span class="required">*</span></label>
          <div class="combo-suggest" data-combo-suggest data-combo-min="1">
            <input id="title" name="title" type="text" maxlength="512" required class="field combo-suggest__input"
                   autocomplete="off" placeholder="Stichwort eingeben …"
                   th:value="${editMode ? alarm.title : ''}"/>
            <ul class="combo-suggest__list" role="listbox" hidden>
              <li class="combo-suggest__option" th:each="s : ${knownStichworte}"
                  th:attr="data-value=${s}" th:text="${s}">Stichwort</li>
            </ul>
          </div>
        </div>
        <div class="form-group">
          <label for="meldebild">Meldebild</label>
          <textarea id="meldebild" name="meldebild" rows="3" class="field"
                    placeholder="z. B. Brennt Mülltonne / Müllcontainer"
                    th:text="${editMode ? alarm.alarmText : ''}"></textarea>
        </div>
        <div class="form-group">
          <label for="bemerkung">Bemerkung</label>
          <input id="bemerkung" name="bemerkung" type="text" maxlength="512" class="field"
                 placeholder="Zusätzliche Hinweise"
                 th:value="${editMode ? alarm.meldebildZusatz : ''}"/>
        </div>
        <div class="form-group">
          <span class="field-label">Sondersignal</span>
          <div class="manual-alarm-form__options">
            <label class="radio-inline">
              <input type="radio" name="sondersignal" value="true"
                     th:checked="${editMode ? alarm.sondersignal : true}"/>
              Mit Sondersignal
            </label>
            <label class="radio-inline">
              <input type="radio" name="sondersignal" value="false"
                     th:checked="${editMode ? !alarm.sondersignal : false}"/>
              ohne Sondersignal
            </label>
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card__header">Einsatzort</div>
      <div class="card__body manual-alarm-form__section">
        <div class="form-group">
          <label for="objectName">Objekt</label>
          <input id="objectName" name="objectName" type="text" maxlength="255" class="field"
                 placeholder="z. B. Kindergarten Anna Polmans"
                 th:value="${editMode ? alarm.objectName : ''}"/>
        </div>
        <div class="form-group">
          <label for="postalCode">PLZ</label>
          <input id="postalCode" name="postalCode" type="text" maxlength="16" class="field"
                 th:value="${editMode ? alarm.postalCode : defaults.postalCode}"/>
        </div>
        <div class="form-group">
          <label for="city">Ort</label>
          <input id="city" name="city" type="text" maxlength="128" class="field"
                 th:value="${editMode ? alarm.city : defaults.city}"/>
        </div>
        <div class="form-group">
          <label for="district">Ortsteil</label>
          <input id="district" name="district" type="text" maxlength="128" class="field"
                 th:value="${editMode ? alarm.district : defaults.district}"
                 placeholder="z. B. Amern"/>
        </div>
        <div class="form-group">
          <label for="street">Straße</label>
          <input id="street" name="street" type="text" maxlength="255" class="field"
                 th:value="${editMode ? alarm.street : ''}"/>
        </div>
        <div class="form-group">
          <label for="houseNumber">Hausnummer</label>
          <input id="houseNumber" name="houseNumber" type="text" maxlength="64" class="field"
                 th:value="${editMode ? alarm.houseNumber : ''}"/>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card__header">Meldung &amp; Kräfte</div>
      <div class="card__body manual-alarm-form__section">
        <div class="form-group">
          <label for="reporterName">Meldender (Name)</label>
          <input id="reporterName" name="reporterName" type="text" maxlength="255" class="field"
                 th:value="${editMode ? alarm.reporterName : ''}"/>
        </div>
        <div class="form-group">
          <label for="reporterPhone">Meldender (Telefon)</label>
          <input id="reporterPhone" name="reporterPhone" type="text" maxlength="64" class="field"
                 th:value="${editMode ? alarm.reporterPhone : ''}"/>
        </div>
        <div class="form-group">
          <label for="meldeweg">Meldeweg</label>
          <input id="meldeweg" name="meldeweg" type="text" maxlength="128" class="field"
                 th:value="${editMode ? alarm.meldeweg : 'Notruf 112'}"/>
        </div>
        <div class="form-group">
          <label for="beteiligteEinsatzmittel">Beteiligte Einsatzmittel</label>
          <input id="beteiligteEinsatzmittel" name="beteiligteEinsatzmittel" type="text" maxlength="512" class="field"
                 th:value="${editMode ? alarm.beteiligteEinsatzmittel : defaults.beteiligteEinsatzmittel}"/>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card__header">Route (Startpunkt)</div>
      <div class="card__body manual-alarm-form__section" id="route-plan-section">
        <input type="hidden" name="routePlanUseGeraetehaus" value="false"/>
        <div class="form-group">
          <label class="checkbox-inline">
            <input type="checkbox" id="routePlanUseGeraetehaus" name="routePlanUseGeraetehaus" value="true"
                   th:checked="${editMode ? alarm.routePlanUseGeraetehaus : true}"/>
            Gerätehaus als Startadresse
          </label>
          <p class="hint" th:if="${geraetehausAddress != null and !#strings.isEmpty(geraetehausAddress)}"
             th:text="${'Standard: ' + geraetehausAddress}">Standard: Gerätehaus-Adresse</p>
          <p class="hint" th:if="${geraetehausAddress == null or #strings.isEmpty(geraetehausAddress)}">
            Gerätehaus-Adresse in den Einheit-Stammdaten pflegen.
          </p>
        </div>
        <div class="form-group" id="route-plan-start-group" hidden>
          <label for="routePlanStartAddress">Eigene Startadresse <span class="required">*</span></label>
          <input id="routePlanStartAddress" name="routePlanStartAddress" type="text" maxlength="512" class="field"
                 placeholder="z. B. Musterstraße 1, 12345 Musterstadt"
                 th:value="${editMode ? alarm.routePlanStartAddress : ''}"/>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card__header">Leitstelle (Alarmdepesche)</div>
      <div class="card__body manual-alarm-form__section">
        <div class="form-group">
          <label for="leitstelleName">Name</label>
          <input id="leitstelleName" name="leitstelleName" type="text" maxlength="255" class="field"
                 th:value="${editMode ? alarm.leitstelleName : defaults.leitstelleName}"/>
        </div>
        <div class="form-group">
          <label for="leitstelleAddress">Adresse</label>
          <input id="leitstelleAddress" name="leitstelleAddress" type="text" maxlength="512" class="field"
                 th:value="${editMode ? alarm.leitstelleAddress : defaults.leitstelleAddress}"/>
        </div>
        <div class="form-group">
          <label for="leitstellePhone">Telefon</label>
          <input id="leitstellePhone" name="leitstellePhone" type="text" maxlength="64" class="field"
                 th:value="${editMode ? alarm.leitstellePhone : ''}"/>
        </div>
        <div class="form-group">
          <label for="leitstelleEmail">E-Mail</label>
          <input id="leitstelleEmail" name="leitstelleEmail" type="email" maxlength="255" class="field"
                 th:value="${editMode ? alarm.leitstelleEmail : ''}"/>
        </div>
      </div>
    </div>

    <div class="manual-alarm-form__actions" th:if="${editMode}">
      <button type="submit" class="btn btn--primary">Änderungen speichern</button>
      <a class="btn btn--outline" th:href="@{/(unit=${unitId})}">Abbrechen</a>
    </div>
    <div class="manual-alarm-form__actions" th:unless="${editMode}">
      <button type="submit" class="btn btn--primary" name="another" value="false">Einsatz speichern</button>
      <button type="submit" class="btn btn--outline" name="another" value="true">Speichern &amp; weiteren anlegen</button>
    </div>
  </form>

  <script th:src="@{/js/combo-suggest.js}" defer></script>
  <script th:src="@{/js/manuell-form.js}" defer></script>
</main>
</html>
