<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout('Einsatz anlegen', ~{::main})}">
<main>
  <div class="page-header page-header--toolbar">
    <div>
      <h2 th:text="${pageTitle}">Einsatz anlegen</h2>
      <p th:text="${pageSubtitle}">Einheit</p>
    </div>
    <div class="toolbar-actions">
      <a class="btn btn--outline btn--sm" th:href="@{/(unit=${unitId})}">← Startseite</a>
    </div>
  </div>

  <div th:replace="~{fragments/flash-messages :: alerts}"></div>

  <form method="post" th:action="@{/einsatz/manuell}" class="form-grid manual-alarm-form einsatzbericht-form-page" id="manual-alarm-form">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    <input type="hidden" name="unit" th:value="${unitId}"/>

    <div class="card form-grid--full">
      <div class="card__header">Einsatzart</div>
      <div class="card__body">
        <div class="form-group form-group--inline-options">
          <label class="radio-inline">
            <input type="radio" name="exercise" value="false" checked/>
            Realer Einsatz
          </label>
          <label class="radio-inline">
            <input type="radio" name="exercise" value="true"/>
            Übung
          </label>
        </div>
      </div>
    </div>

    <div class="card form-grid--full">
      <div class="card__header">Einsatz</div>
      <div class="card__body incident-form-grid-2">
        <div class="form-group">
          <label for="alarmNumber">Einsatznummer</label>
          <input id="alarmNumber" name="alarmNumber" type="text" maxlength="64" class="field"
                 th:value="${suggestedAlarmNumber}"
                 th:attr="data-unit-id=${unitId}"/>
          <p class="hint">Automatisch vorgeschlagen — anpassbar.</p>
        </div>
        <div class="form-group">
          <label for="title">Stichwort <span class="required">*</span></label>
          <div class="combo-suggest" data-combo-suggest data-combo-min="1">
            <input id="title" name="title" type="text" maxlength="512" required class="field combo-suggest__input"
                   autocomplete="off" placeholder="Stichwort eingeben …"/>
            <ul class="combo-suggest__list" role="listbox" hidden>
              <li class="combo-suggest__option" th:each="s : ${knownStichworte}"
                  th:attr="data-value=${s}" th:text="${s}">Stichwort</li>
            </ul>
          </div>
        </div>
        <div class="form-group form-group--full">
          <label for="meldebild">Meldebild</label>
          <textarea id="meldebild" name="meldebild" rows="3" class="field"
                    placeholder="z. B. Brennt Mülltonne / Müllcontainer"></textarea>
        </div>
        <div class="form-group form-group--full">
          <label for="bemerkung">Bemerkung</label>
          <input id="bemerkung" name="bemerkung" type="text" maxlength="512" class="field"
                 placeholder="Zusätzliche Hinweise"/>
        </div>
        <div class="form-group form-group--full">
          <span class="field-label">Sondersignal</span>
          <div class="form-group--inline-options">
            <label class="radio-inline">
              <input type="radio" name="sondersignal" value="true" checked/>
              Mit Sondersignal
            </label>
            <label class="radio-inline">
              <input type="radio" name="sondersignal" value="false"/>
              ohne Sondersignal
            </label>
          </div>
        </div>
      </div>
    </div>

    <div class="card form-grid--full">
      <div class="card__header">Einsatzort</div>
      <div class="card__body incident-form-grid-2">
        <div class="form-group form-group--full">
          <label for="objectName">Objekt</label>
          <input id="objectName" name="objectName" type="text" maxlength="255" class="field"
                 placeholder="z. B. Kindergarten Anna Polmans"/>
        </div>
        <div class="form-group">
          <label for="postalCode">PLZ</label>
          <input type="hidden" name="postalCode" th:value="${defaults.postalCode}"/>
          <input id="postalCode" type="text" maxlength="16" class="field"
                 th:value="${defaults.postalCode}" readonly="readonly" tabindex="-1"/>
        </div>
        <div class="form-group">
          <label for="city">Ort</label>
          <input type="hidden" name="city" th:value="${defaults.city}"/>
          <input id="city" type="text" maxlength="128" class="field"
                 th:value="${defaults.city}" readonly="readonly" tabindex="-1"/>
        </div>
        <div class="form-group">
          <label for="district">Ortsteil</label>
          <input type="hidden" name="district" th:value="${defaults.district}"/>
          <input id="district" type="text" maxlength="128" class="field"
                 th:value="${defaults.district}" readonly="readonly" tabindex="-1"/>
        </div>
        <div class="form-group">
          <label for="street">Straße <span class="required">*</span></label>
          <input id="street" name="street" type="text" maxlength="255" class="field" required/>
        </div>
        <div class="form-group">
          <label for="houseNumber">Hausnummer <span class="required">*</span></label>
          <input id="houseNumber" name="houseNumber" type="text" maxlength="64" class="field" required/>
        </div>
      </div>
    </div>

    <div class="card form-grid--full">
      <div class="card__header">Meldung &amp; Kräfte</div>
      <div class="card__body incident-form-grid-2">
        <div class="form-group">
          <label for="reporterName">Meldender (Name)</label>
          <input id="reporterName" name="reporterName" type="text" maxlength="255" class="field"/>
        </div>
        <div class="form-group">
          <label for="reporterPhone">Meldender (Telefon)</label>
          <input id="reporterPhone" name="reporterPhone" type="text" maxlength="64" class="field"/>
        </div>
        <div class="form-group">
          <label for="meldeweg">Meldeweg</label>
          <input id="meldeweg" name="meldeweg" type="text" maxlength="128" class="field" value="Notruf 112"/>
        </div>
        <div class="form-group form-group--full">
          <label for="beteiligteEinsatzmittel">Beteiligte Einsatzmittel</label>
          <input id="beteiligteEinsatzmittel" name="beteiligteEinsatzmittel" type="text" maxlength="512" class="field"
                 th:value="${defaults.beteiligteEinsatzmittel}"/>
        </div>
      </div>
    </div>

    <div class="card form-grid--full">
      <div class="card__header">Leitstelle (Alarmdepesche)</div>
      <div class="card__body incident-form-grid-2">
        <div class="form-group form-group--full">
          <label for="leitstelleName">Name</label>
          <input id="leitstelleName" name="leitstelleName" type="text" maxlength="255" class="field"
                 th:value="${defaults.leitstelleName}"/>
        </div>
        <div class="form-group form-group--full">
          <label for="leitstelleAddress">Adresse</label>
          <input id="leitstelleAddress" name="leitstelleAddress" type="text" maxlength="512" class="field"
                 th:value="${defaults.leitstelleAddress}"/>
        </div>
        <div class="form-group">
          <label for="leitstellePhone">Telefon</label>
          <input id="leitstellePhone" name="leitstellePhone" type="text" maxlength="64" class="field"/>
        </div>
        <div class="form-group">
          <label for="leitstelleEmail">E-Mail</label>
          <input id="leitstelleEmail" name="leitstelleEmail" type="email" maxlength="255" class="field"/>
        </div>
      </div>
    </div>

    <div class="card form-grid--full">
      <div class="card__body">
        <div class="btn-group">
          <button type="submit" class="btn btn--primary" name="another" value="false">Einsatz speichern</button>
          <button type="submit" class="btn btn--outline" name="another" value="true">Speichern &amp; weiteren anlegen</button>
        </div>
      </div>
    </div>
  </form>

  <script th:src="@{/js/combo-suggest.js}" defer></script>
  <script th:src="@{/js/manuell-form.js}" defer></script>
</main>
</html>
