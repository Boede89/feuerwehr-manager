<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Mein Bereich')}"></head>
<body>
<div th:insert="~{fragments/app-shell :: shell-start}"></div>

  <div class="page-header">
    <div>
      <h2>Mein Bereich</h2>
      <p>Persönliche Einstellungen und Informationen</p>
    </div>
  </div>

  <div class="card card--narrow">
    <p class="hint" style="margin-top:0;">
      Angemeldet als <strong th:text="${displayName}">Name</strong>
      (<span th:text="'@' + ${username}">@user</span>)
    </p>
    <p class="hint" style="margin-top:16px;">
      Hier kommen später persönliche Felder, die Sie selbst einsehen und teilweise bearbeiten können.
    </p>
    <div class="actions" style="margin-top:20px;">
      <a class="btn btn--outline" th:href="@{/profile/password}">Passwort ändern</a>
    </div>
  </div>

<div th:insert="~{fragments/app-shell :: shell-end}"></div>
</body>
</html>
