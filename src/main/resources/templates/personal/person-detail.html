<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(${isNewPerson ? 'Neue Person' : personDisplayName}, ~{::main})}">
<main th:attr="data-person-create=${isNewPerson}">

  <div class="member-detail-header">
    <a class="btn btn--outline btn--sm page-back" th:href="@{/personal(unit=${unitId})}">← Zurück</a>
    <div>
      <h2 class="member-detail-title" th:text="${isNewPerson ? 'Neue Person' : personDisplayName}">Person</h2>
      <p class="hint text-sm" th:if="${!isNewPerson and person.user != null}" th:text="${person.user.username}">user</p>
      <p class="hint" th:if="${isNewPerson}" th:text="${currentUnitName}">Einheit</p>
    </div>
  </div>
  <div th:replace="~{fragments/testmode-banner :: banner}"></div>
  <div th:replace="~{fragments/flash-messages :: alerts}"></div>

  <!-- Neuanlage (vereinfacht) -->
  <th:block th:if="${isNewPerson}">
    <form method="post" th:action="@{/personal/new}" id="personCreateForm">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <input type="hidden" name="unit" th:value="${unitId}"/>
      <div class="card card--narrow">
        <div class="card__header">Neue Person</div>
        <div class="card__body">
          <div class="form-grid form-grid--2">
            <div class="form-group">
              <label for="firstName">Vorname</label>
              <input id="firstName" name="firstName" type="text" required maxlength="100" th:value="${formFirstName}"/>
            </div>
            <div class="form-group">
              <label for="lastName">Nachname</label>
              <input id="lastName" name="lastName" type="text" required maxlength="100" th:value="${formLastName}"/>
            </div>
            <div class="form-group">
              <label for="email">E-Mail</label>
              <input id="email" name="email" type="email" maxlength="255" th:value="${formEmail}"/>
            </div>
            <div class="form-group">
              <label for="phone">Telefon</label>
              <input id="phone" name="phone" type="tel" maxlength="50" th:value="${formPhone}"/>
            </div>
            <div class="form-group">
              <label for="birthdate">Geburtsdatum</label>
              <input id="birthdate" name="birthdate" type="date" th:value="${formBirthdate}"/>
            </div>
            <div class="form-group">
              <label for="personnelNumber">Personalnummer</label>
              <input id="personnelNumber" name="personnelNumber" type="text" maxlength="50"/>
            </div>
            <div class="form-group form-group--full" th:if="${isAdmin}">
              <label class="checkbox-row">
                <input id="allowLogin" name="allowLogin" type="checkbox" value="true" th:checked="${formAllowLogin}"/>
                <span>Login erlauben</span>
              </label>
              <p class="hint">Legt automatisch ein Benutzerkonto an. Startpasswort wird nach dem Speichern angezeigt.</p>
            </div>
          </div>
          <div class="btn-group mt-md">
            <button type="submit" class="btn btn--primary">Person anlegen</button>
            <a class="btn btn--outline" th:href="@{/personal(unit=${unitId})}">Abbrechen</a>
          </div>
        </div>
      </div>
    </form>
  </th:block>

  <!-- Bestehende Person: FW-Hub Tabs -->
  <th:block th:unless="${isNewPerson}">
    <div th:replace="~{fragments/personal-member-tabs :: memberTabs}"></div>
    <script th:src="@{/js/personal-member.js}" defer></script>
  </th:block>

</main>
</html>
