<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <title>Neue Person – Feuerwehr-Manager</title>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<header class="bar">
  <h1>Neue Person</h1>
  <a class="link" th:href="@{/personal(unit=${unitId})}">← Personal</a>
</header>
<main>
  <div class="err" th:if="${error}" th:text="${error}">Fehler</div>

  <form method="post" th:action="@{/personal/new}" class="card">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    <input type="hidden" name="unit" th:value="${unitId}"/>
    <label for="firstName">Vorname</label>
    <input id="firstName" name="firstName" type="text" required maxlength="100" th:value="${firstName}"/>
    <label for="lastName">Nachname</label>
    <input id="lastName" name="lastName" type="text" required maxlength="100" th:value="${lastName}"/>
    <label for="email">E-Mail (optional)</label>
    <input id="email" name="email" type="email" maxlength="255" th:value="${email}"/>
    <label for="phone">Telefon (optional)</label>
    <input id="phone" name="phone" type="tel" maxlength="50" th:value="${phone}"/>
    <button type="submit" class="btn btn-block">Person anlegen</button>
  </form>
</main>
</body>
</html>
