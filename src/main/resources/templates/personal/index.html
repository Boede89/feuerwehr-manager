<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <title>Personal – Feuerwehr-Manager</title>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<header class="bar">
  <h1>Personal</h1>
  <a class="link" th:href="@{/(unit=${unitId})}">← Dashboard</a>
</header>
<main>
  <p class="hint">Einheit: <strong th:text="${currentUnitName}">—</strong> · <span th:text="${personCount}">0</span> Personen</p>
  <div class="ok" th:if="${saved}" th:text="${message} ?: 'Gespeichert.'">OK</div>
  <div class="err" th:if="${error}" th:text="${error}">Fehler</div>

  <p style="margin:0 0 1rem;">
    <a class="btn" th:href="@{/personal/new(unit=${unitId})}">Neue Person</a>
  </p>

  <div class="list">
    <div class="list-row" th:if="${#lists.isEmpty(persons)}">
      <span>Noch keine Personen erfasst.</span>
    </div>
    <div class="list-row" th:each="p : ${persons}">
      <span>
        <strong th:text="${p.firstName + ' ' + p.lastName}">Name</strong>
        <span class="hint" style="margin:0;display:block;"
              th:if="${p.qualificationType != null}" th:text="${p.qualificationType.name}">Quali</span>
        <span class="badge" th:classappend="${p.status.name() == 'ACTIVE'} ? ' active' : ' inactive'"
              th:text="${p.status.name() == 'ACTIVE'} ? 'Aktiv' : 'Inaktiv'">Status</span>
      </span>
      <a class="btn btn-secondary" th:href="@{/personal/{id}(id=${p.id},unit=${unitId})}">Bearbeiten</a>
    </div>
  </div>
</main>
</body>
</html>
