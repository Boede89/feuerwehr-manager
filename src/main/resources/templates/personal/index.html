<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout('Personal', ~{::main})}">
<main>
  <div class="page-header">
    <div>
      <h2>Personal</h2>
      <p>Mitgliederverwaltung · <span th:text="${personCount}">0</span> Personen · <strong th:text="${currentUnitName}">—</strong></p>
    </div>
    <a class="btn btn--primary" th:href="@{/personal/new(unit=${unitId})}">+ Neue Person</a>
  </div>

  <div th:replace="~{fragments/testmode-banner :: banner}"></div>
  <div th:replace="~{fragments/flash-messages :: alerts}"></div>

  <input type="search" class="person-search" id="personSearch" placeholder="Name suchen…" autocomplete="off"
         aria-label="Personen suchen"/>

  <div class="person-list" id="personList">
    <a class="person-list-item" th:each="p : ${persons}"
       th:href="@{/personal/{id}(id=${p.id},unit=${unitId})}"
       th:attr="data-search=${p.lastName + ' ' + p.firstName + ' ' + (p.email != null ? p.email : '')}">
      <span class="person-list-avatar"
            th:text="${#strings.substring(p.firstName,0,1) + #strings.substring(p.lastName,0,1)}">AB</span>
      <span class="person-list-body">
        <span class="person-list-name" th:text="${p.firstName + ' ' + p.lastName}">Name</span>
        <span class="person-list-sub" th:text="${p.email != null ? p.email : '—'}">E-Mail</span>
      </span>
      <span class="person-list-chevron" aria-hidden="true">›</span>
    </a>
    <p class="hint" th:if="${#lists.isEmpty(persons)}" id="personListEmpty">Noch keine Personen erfasst.</p>
  </div>
  <script th:src="@{/js/personal-list.js}"></script>
</main>
</html>
