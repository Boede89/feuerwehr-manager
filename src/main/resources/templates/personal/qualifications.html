<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <title>Qualifikationen – Personal</title>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<header class="bar">
  <h1>Qualifikationen</h1>
  <a class="link" th:href="@{/personal(unit=${unitId})}">← Personal</a>
</header>
<main>
  <div class="ok" th:if="${saved}" th:text="${message} ?: 'Gespeichert.'">OK</div>
  <div class="err" th:if="${error}" th:text="${error}">Fehler</div>

  <form method="post" th:action="@{/personal/setup/qualifications}" class="card">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    <input type="hidden" name="unit" th:value="${unitId}"/>
    <label for="name">Neue Qualifikation</label>
    <input id="name" name="name" type="text" required maxlength="128" placeholder="z. B. Gruppenführer"/>
    <button type="submit" class="btn btn-block">Anlegen</button>
  </form>

  <div class="list">
    <h2>Vorhanden</h2>
    <div class="list-row" th:if="${#lists.isEmpty(types)}"><span>Keine Qualifikationen.</span></div>
    <div class="list-row" th:each="t : ${types}">
      <span th:text="${t.name}">Qualifikation</span>
      <span class="badge" th:classappend="${t.active} ? ' active' : ' inactive'" th:text="${t.active} ? 'Aktiv' : 'Inaktiv'">Status</span>
    </div>
  </div>
</main>
</body>
</html>
