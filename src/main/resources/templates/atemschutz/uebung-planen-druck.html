<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>PA-Träger Suchergebnisse</title>
  <th:block th:replace="~{fragments/atemschutz-print-header :: styles}"></th:block>
</head>
<body>
  <th:block th:replace="~{fragments/atemschutz-print-header :: header}"></th:block>

  <table class="summary-grid">
    <tr>
      <td>
        <span class="summary-label">Übungsdatum</span>
        <strong th:text="${#temporals.format(planResult.uebungsDatum(), 'dd.MM.yyyy')}">—</strong>
      </td>
      <td>
        <span class="summary-label">Anzahl</span>
        <strong th:text="${anzahlLabel}">—</strong>
      </td>
    </tr>
    <tr>
      <td>
        <span class="summary-label">Status-Filter</span>
        <strong>
          <span th:each="status, stat : ${planResult.statusFilter()}"
                th:text="${status.label() + (stat.last ? '' : ', ')}">—</span>
        </strong>
      </td>
      <td>
        <span class="summary-label">Gefunden</span>
        <strong th:text="${planResult.carriers().size() + ' von ' + planResult.totalMatches()}">0</strong>
      </td>
    </tr>
  </table>

  <table th:if="${!#lists.isEmpty(planResult.carriers())}">
    <thead>
    <tr>
      <th>#</th>
      <th>Name</th>
      <th>Status</th>
      <th>Strecke</th>
      <th>G26</th>
      <th>Übung/Einsatz</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="row, stat : ${planResult.carriers()}">
      <td th:text="${stat.count}">1</td>
      <td th:text="${row.overview().carrier().person.displayName()}">Name</td>
      <td th:text="${row.planStatus().label()}">—</td>
      <td>
        <th:block th:with="view=${row.overview().summaries().get(T(de.feuerwehr.manager.atemschutz.AtemschutzFitnessType).STRECKEN)}">
          <span th:if="${view == null or view.validUntil == null}">—</span>
          <span th:if="${view != null and view.validUntil != null}"
                th:text="${#temporals.format(view.validUntil, 'dd.MM.yyyy')}">—</span>
        </th:block>
      </td>
      <td>
        <th:block th:with="view=${row.overview().g26()}">
          <span th:if="${view == null or view.validUntil == null}">—</span>
          <span th:if="${view != null and view.validUntil != null}"
                th:text="${#temporals.format(view.validUntil, 'dd.MM.yyyy')}">—</span>
        </th:block>
      </td>
      <td>
        <th:block th:with="view=${row.overview().summaries().get(T(de.feuerwehr.manager.atemschutz.AtemschutzFitnessType).UEBUNG)}">
          <span th:if="${view == null or view.validUntil == null}">—</span>
          <span th:if="${view != null and view.validUntil != null}"
                th:text="${#temporals.format(view.validUntil, 'dd.MM.yyyy')}">—</span>
        </th:block>
      </td>
    </tr>
    </tbody>
  </table>
  <p th:if="${#lists.isEmpty(planResult.carriers())}" class="pdf-meta">Keine passenden PA-Träger gefunden.</p>
</body>
</html>
