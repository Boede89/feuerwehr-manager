<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Übungsstrecke – Planungsübersicht</title>
  <th:block th:replace="~{fragments/atemschutz-print-header :: styles}"></th:block>
  <style>
    ul { margin: 0; padding-left: 18px; }
  </style>
</head>
<body>
  <th:block th:replace="~{fragments/atemschutz-print-header :: actions}"></th:block>
  <th:block th:replace="~{fragments/atemschutz-print-header :: header}"></th:block>

  <h2>Geplante Termine</h2>
  <table th:if="${!#lists.isEmpty(termine)}">
    <thead>
      <tr>
        <th>Datum</th>
        <th>Uhrzeit</th>
        <th>Ort</th>
        <th>Belegung</th>
        <th>Teilnehmer</th>
      </tr>
    </thead>
    <tbody>
      <tr th:each="termin : ${termine}" th:if="${!termin.vergangen}">
        <td th:text="${termin.datumAnzeige}">—</td>
        <td th:text="${termin.zeitAnzeige}">—</td>
        <td th:text="${!#strings.isEmpty(termin.ort) ? termin.ort : '—'}">—</td>
        <td th:text="${termin.aktuelleTeilnehmer + '/' + termin.maxTeilnehmer}">—</td>
        <td>
          <span th:if="${#lists.isEmpty(termin.teilnehmer)}">—</span>
          <span th:each="teilnehmer, stat : ${termin.teilnehmer}">
            <span th:text="${teilnehmer.name}">Name</span><span th:if="${!stat.last}">, </span>
          </span>
        </td>
      </tr>
    </tbody>
  </table>
  <p th:if="${#lists.isEmpty(termine)}" class="print-meta"><em>Keine Termine vorhanden.</em></p>

  <h2>Nicht zugeordnete Geräteträger (<span th:text="${#lists.size(unassignedCarriers)}">0</span>)</h2>
  <ul th:if="${!#lists.isEmpty(unassignedCarriers)}">
    <li th:each="carrier : ${unassignedCarriers}">
      <span th:text="${carrier.name}">Name</span>
      <span th:if="${!#strings.isEmpty(carrier.metaText)}">
        – Strecke bis <span th:text="${carrier.metaText}">—</span>
      </span>
    </li>
  </ul>
  <p th:if="${#lists.isEmpty(unassignedCarriers)}" class="print-meta"><em>Alle Geräteträger sind zugeordnet.</em></p>
</body>
</html>
