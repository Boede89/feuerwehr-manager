<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Übungsstrecke – Planungsübersicht</title>
  <style>
    @page { size: A4; margin: 15mm; }
    * { box-sizing: border-box; }
    body { font-family: Arial, Helvetica, sans-serif; font-size: 11pt; color: #222; margin: 0; padding: 16px; }
    h1 { font-size: 18pt; margin: 0 0 4px; }
    h2 { font-size: 13pt; margin: 20px 0 8px; border-bottom: 2px solid #667eea; padding-bottom: 4px; }
    .meta { color: #555; margin-bottom: 16px; }
    table { width: 100%; border-collapse: collapse; margin-bottom: 16px; }
    th, td { border: 1px solid #ccc; padding: 6px 8px; text-align: left; vertical-align: top; }
    th { background: #667eea; color: #fff; }
    tr:nth-child(even) { background: #f7f7f7; }
    ul { margin: 0; padding-left: 18px; }
    .print-actions { margin-bottom: 16px; }
    @media print { .print-actions { display: none; } }
  </style>
</head>
<body>
  <div class="print-actions">
    <button type="button" onclick="window.print()">Drucken / Als PDF speichern</button>
  </div>
  <h1>Übungsstrecke – Planungsübersicht</h1>
  <p class="meta">
    <strong th:text="${currentUnitName}">Einheit</strong> ·
    Stand: <span th:text="${#temporals.format(T(java.time.LocalDateTime).now(), 'dd.MM.yyyy HH:mm')}">—</span> Uhr
  </p>

  <h2>Geplante Termine</h2>
  <table th:if="${!#lists.isEmpty(termine)}">
    <thead>
      <tr>
        <th>Datum</th>
        <th>Uhrzeit</th>
        <th>Ort</th>
        <th>Belegung</th>
        <th>Teilnehmer</th>
      </tr>
    </thead>
    <tbody>
      <tr th:each="termin : ${termine}" th:if="${!termin.vergangen}">
        <td th:text="${#temporals.format(termin.datum, 'dd.MM.yyyy')}">—</td>
        <td th:text="|${#temporals.format(termin.zeit, 'HH:mm')} Uhr|">—</td>
        <td th:text="${termin.ort != null and !#strings.isEmpty(termin.ort) ? termin.ort : '—'}">—</td>
        <td th:text="|${termin.aktuelleTeilnehmer}/${termin.maxTeilnehmer}|">—</td>
        <td>
          <span th:if="${#lists.isEmpty(termin.teilnehmer)}">—</span>
          <span th:each="teilnehmer, stat : ${termin.teilnehmer}">
            <span th:text="${teilnehmer.name}">Name</span><span th:if="${!stat.last}">, </span>
          </span>
        </td>
      </tr>
    </tbody>
  </table>
  <p th:if="${#lists.isEmpty(termine)}"><em>Keine Termine vorhanden.</em></p>

  <h2>Nicht zugeordnete Geräteträger (<span th:text="${#lists.size(unassignedCarriers)}">0</span>)</h2>
  <ul th:if="${!#lists.isEmpty(unassignedCarriers)}">
    <li th:each="carrier : ${unassignedCarriers}">
      <span th:text="${carrier.name}">Name</span>
      <span th:if="${carrier.streckeBis != null}">
        – Strecke bis <span th:text="${#temporals.format(carrier.streckeBis, 'dd.MM.yyyy')}">—</span>
      </span>
    </li>
  </ul>
  <p th:if="${#lists.isEmpty(unassignedCarriers)}"><em>Alle Geräteträger sind zugeordnet.</em></p>
</body>
</html>
