<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Atemschutz – Geräteträgerliste</title>
  <th:block th:replace="~{fragments/atemschutz-print-header :: styles}"></th:block>
</head>
<body>
  <th:block th:replace="~{fragments/atemschutz-print-header :: header}"></th:block>

  <table th:if="${!#lists.isEmpty(carriers)}">
    <thead>
    <tr>
      <th>Name</th>
      <th>Status</th>
      <th>Tauglichkeit</th>
      <th>G26</th>
      <th>Übung/Einsatz</th>
      <th>Strecke</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="row : ${carriers}">
      <td th:text="${row.carrier.person.displayName()}">Name</td>
      <td th:text="${row.carrier.status.label()}">Aktiv</td>
      <td th:text="${row.tauglichkeit.label()}">—</td>
      <td>
        <th:block th:with="view=${row.g26}">
          <span th:if="${view == null or view.validUntil == null}">—</span>
          <span th:if="${view != null and view.validUntil != null}"
                th:text="${#temporals.format(view.validUntil, 'dd.MM.yyyy')}">—</span>
        </th:block>
      </td>
      <td>
        <th:block th:with="view=${row.summaries.get(T(de.feuerwehr.manager.atemschutz.AtemschutzFitnessType).UEBUNG)}">
          <span th:if="${view == null or view.validUntil == null}">—</span>
          <span th:if="${view != null and view.validUntil != null}"
                th:text="${#temporals.format(view.validUntil, 'dd.MM.yyyy')}">—</span>
        </th:block>
      </td>
      <td>
        <th:block th:with="view=${row.summaries.get(T(de.feuerwehr.manager.atemschutz.AtemschutzFitnessType).STRECKEN)}">
          <span th:if="${view == null or view.validUntil == null}">—</span>
          <span th:if="${view != null and view.validUntil != null}"
                th:text="${#temporals.format(view.validUntil, 'dd.MM.yyyy')}">—</span>
        </th:block>
      </td>
    </tr>
    </tbody>
  </table>
  <p th:if="${#lists.isEmpty(carriers)}" class="pdf-meta">Keine Geräteträger für diese Auswahl.</p>
</body>
</html>
