<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Gerätewartmitteilung</title>
  <style>
    @page { size: A4; margin: 12mm; }
    * { box-sizing: border-box; }
    body { font-family: Arial, Helvetica, sans-serif; font-size: 9pt; line-height: 1.3; color: #333; margin: 0; padding: 6px 12px; }
    .header { text-align: center; margin-bottom: 8px; }
    .header img { max-height: 120px; max-width: 320px; }
    .section { margin-bottom: 8px; }
    .section-title { font-weight: bold; font-size: 10pt; margin-bottom: 4px; padding-bottom: 2px; border-bottom: 1px solid #333; }
    table { width: 100%; border-collapse: collapse; font-size: 9pt; }
    .label-cell { width: 120px; background: #f5f5f5; font-weight: bold; padding: 3px 6px; border: 1px solid #ddd; }
    .value-cell { padding: 3px 6px; border: 1px solid #ddd; }
    @media print { .section { page-break-inside: avoid; } }
  </style>
</head>
<body>
  <div class="header" th:if="${unitLogoBase64 != null and !#strings.isEmpty(unitLogoBase64)}">
    <img th:src="${unitLogoBase64}" alt=""/>
  </div>

  <div class="section">
    <div class="section-title">Gerätewartmitteilung</div>
    <table>
      <tr>
        <td class="label-cell">Typ</td>
        <td class="value-cell" th:text="${typLabel}">Übung</td>
      </tr>
      <tr>
        <td class="label-cell">Datum</td>
        <td class="value-cell" th:text="${eventDate}">01.01.2026</td>
      </tr>
      <tr>
        <td class="label-cell">Einsatzbereitschaft</td>
        <td class="value-cell" th:text="${readinessLabel}">—</td>
      </tr>
      <tr>
        <td class="label-cell" th:text="${leaderLabel}">Einsatzleiter</td>
        <td class="value-cell" th:text="${leaderDisplay}">—</td>
      </tr>
    </table>
  </div>

  <div class="section">
    <div class="section-title">Eingesetzte Fahrzeuge</div>
    <table>
      <tr>
        <th class="label-cell">Fahrzeug</th>
        <th class="label-cell">Geräte</th>
      </tr>
      <tr th:each="row : ${vehicles}">
        <td class="label-cell" th:text="${row.vehicleName()}">—</td>
        <td class="value-cell"
            th:text="${row.equipmentNames() != null and !row.equipmentNames().isEmpty() ? #strings.listJoin(row.equipmentNames(), ', ') : '—'}">—</td>
      </tr>
      <tr th:if="${vehicles == null or vehicles.isEmpty()}">
        <td class="label-cell">—</td>
        <td class="value-cell">—</td>
      </tr>
    </table>
  </div>
</body>
</html>
