<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(${pageTitle}, ~{::main})}">
<main class="einsatzbericht-form-page" data-berichte-form="maengel">
  <div class="page-header">
    <div>
      <h2 th:text="${pageTitle}">Neuer Mängelbericht</h2>
      <p th:text="${pageSubtitle}">Mangel oder Schaden erfassen</p>
    </div>
    <div class="einsatzbericht-form-actions">
      <a class="btn btn--outline" th:href="@{/berichte(unit=${unitId}, tab='maengel')}">Abbrechen</a>
      <form th:if="${formMode == 'edit' and canDeleteReport}" method="post"
            th:action="@{/berichte/maengelberichte/{id}/delete(id=${report.id})}"
            class="bar-form"
            data-confirm
            data-confirm-title="Mängelbericht löschen?"
            data-confirm-message="Diese Aktion kann nicht rückgängig gemacht werden."
            data-confirm-label="Löschen"
            data-confirm-variant="danger">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <input type="hidden" name="unit" th:value="${unitId}"/>
        <button type="submit" class="btn btn--danger">Löschen</button>
      </form>
      <a class="btn btn--outline" th:if="${formMode == 'edit'}"
         th:href="@{/berichte/maengelberichte/{id}/pdf(id=${report.id},unit=${unitId})}">PDF herunterladen</a>
      <th:block th:if="${formMode == 'edit'}" th:replace="~{fragments/berichte-print-form :: button(
        @{/berichte/maengelberichte/{id}/drucken(id=${report.id})},
        ${unitId},
        @{/berichte/maengelberichte/{id}/bearbeiten(id=${report.id}, unit=${unitId})}
      )}"></th:block>
      <button type="submit" class="btn btn--primary" form="maengel-form">Speichern</button>
    </div>
  </div>

  <div th:replace="~{fragments/testmode-banner :: banner}"></div>
  <div th:replace="~{fragments/flash-messages :: alerts}"></div>

  <div class="card">
    <div class="card__body">
      <form id="maengel-form" method="post"
            th:action="${formMode == 'edit'} ? @{/berichte/maengelberichte/{id}(id=${report.id},unit=${unitId})} : @{/berichte/maengelberichte(unit=${unitId})}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <th:block th:replace="~{fragments/berichte-maengel-form :: form}"></th:block>
      </form>
    </div>
  </div>

  <script th:src="@{/js/combo-suggest.js}" defer></script>
  <script th:src="@{/js/berichte-maengel-form.js}" defer></script>
</main>
</html>
