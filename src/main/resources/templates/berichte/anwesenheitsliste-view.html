<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(${pageTitle}, ~{::main})}">
<main class="einsatzbericht-form-page einsatzbericht-view-page" data-berichte-form="anwesenheit">
  <meta name="berichte-api-base" content="/berichte/anwesenheitslisten"/>

  <div class="page-header">
    <div>
      <a class="btn btn--outline btn--sm page-back" th:if="${backUrl != null}" th:href="${backUrl}">← Zurück</a>
      <a class="btn btn--outline btn--sm page-back" th:unless="${backUrl != null}"
         th:href="@{/berichte(unit=${unitId}, tab='anwesenheit')}">← Zurück</a>
      <h2 th:text="${pageTitle}">Anwesenheitsliste</h2>
      <p th:text="${pageSubtitle}">Anzeige</p>
    </div>
    <div class="einsatzbericht-form-actions">
      <span class="incident-status-pill incident-status-pill--header"
            th:classappend="${' incident-status-pill--' + report.status.cssModifier()}"
            th:text="${report.status.label()}">Entwurf</span>
      <a class="btn btn--outline"
         th:href="@{/berichte/anwesenheitslisten/{id}/pdf(id=${report.id},unit=${unitId})}">PDF herunterladen</a>
      <th:block th:replace="~{fragments/berichte-print-form :: button(
        @{/berichte/anwesenheitslisten/{id}/drucken(id=${report.id})},
        ${unitId},
        @{/berichte/anwesenheitslisten/{id}(id=${report.id}, unit=${unitId})}
      )}"></th:block>
      <a class="btn btn--primary" th:if="${canEditReport}"
         th:href="@{/berichte/anwesenheitslisten/{id}/bearbeiten(id=${report.id},unit=${unitId})}">Bearbeiten</a>
      <form th:if="${canRelease}" method="post"
            th:action="@{/berichte/anwesenheitslisten/{id}/freigeben(id=${report.id})}"
            class="bar-form"
            data-confirm-anwesenheit-release
            th:attr="data-release-print-report=${anwesenheitReleaseDefaultPrintReport},
                     data-release-create-geraetewart=${anwesenheitReleaseDefaultCreateGeraetewart},
                     data-release-print-geraetewart=${anwesenheitReleaseDefaultPrintGeraetewart},
                     data-release-print-maengel=${anwesenheitReleaseDefaultPrintMaengel},
                     data-release-has-material-damages=${anwesenheitReleaseHasMaterialDamages},
                     data-release-has-deployed-equipment=${anwesenheitReleaseHasDeployedEquipment}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <input type="hidden" name="unit" th:value="${unitId}"/>
        <input type="hidden" name="returnUrl"
               th:value="${anwesenheitListPath != null ? anwesenheitListPath : '/berichte?tab=anwesenheit'}"/>
        <button type="submit" class="btn btn--primary btn--success">Freigeben</button>
      </form>
      <form th:if="${canArchive}" method="post"
            th:action="@{/berichte/anwesenheitslisten/{id}/archivieren(id=${report.id})}"
            class="bar-form"
            data-confirm
            data-confirm-title="Anwesenheitsliste archivieren?"
            data-confirm-message="Die Liste wird ins Archiv verschoben und erscheint standardmäßig nicht mehr in der aktiven Liste."
            data-confirm-label="Archivieren">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <input type="hidden" name="unit" th:value="${unitId}"/>
        <input type="hidden" name="returnUrl"
               th:value="${anwesenheitListPath != null ? anwesenheitListPath : '/berichte?tab=anwesenheit'}"/>
        <button type="submit" class="btn btn--outline">Archivieren</button>
      </form>
    </div>
  </div>

  <div th:replace="~{fragments/testmode-banner :: banner}"></div>
  <div th:replace="~{fragments/flash-messages :: alerts}"></div>

  <div class="card">
    <div class="card__body card__body--flush">
      <div id="einsatzbericht-view" class="einsatzbericht-form--view">
        <th:block th:replace="~{fragments/berichte-anwesenheit-form :: form}"></th:block>
      </div>
    </div>
  </div>

  <script th:src="@{/js/berichte-api-base.js}" defer></script>
  <script th:src="@{/js/berichte-anwesenheit-release.js}" defer></script>
  <script th:src="@{/js/berichte-einsatz-form.js}" defer></script>
  <script th:src="@{/js/berichte-kraefte.js}" defer></script>
  <script th:src="@{/js/berichte-kraefte-foreign.js}" defer></script>
  <script th:src="@{/js/berichte-geraete.js}" defer></script>
  <script th:src="@{/js/berichte-schaeden.js}" defer></script>
  <script th:src="@{/js/berichte-anwesenheit-crew-injury.js}" defer></script>
  <script th:src="@{/js/berichte-anhaenge.js}" defer></script>
</main>
</html>
