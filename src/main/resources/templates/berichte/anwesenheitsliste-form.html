<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(${pageTitle}, ~{::main})}">
<main class="einsatzbericht-form-page" data-berichte-form="anwesenheit">
  <meta name="berichte-api-base" content="/berichte/anwesenheitslisten"/>

  <div class="page-header">
    <div>
      <h2 th:text="${pageTitle}">Neue Anwesenheitsliste</h2>
      <p th:text="${pageSubtitle}">Entwurf</p>
    </div>
    <div class="einsatzbericht-form-actions">
      <a class="btn btn--outline" th:href="@{/berichte(unit=${unitId}, tab='anwesenheit')}">Abbrechen</a>
      <form th:if="${formMode == 'edit' and canDeleteReport}" method="post"
            th:action="@{/berichte/anwesenheitslisten/{id}/delete(id=${report.id})}"
            class="bar-form"
            onsubmit="return confirm('Anwesenheitsliste wirklich löschen? Diese Aktion kann nicht rückgängig gemacht werden.');">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <input type="hidden" name="unit" th:value="${unitId}"/>
        <button type="submit" class="btn btn--danger">Löschen</button>
      </form>
      <button type="submit" class="btn btn--primary" form="anwesenheitsliste-form">Speichern</button>
    </div>
  </div>

  <div th:replace="~{fragments/testmode-banner :: banner}"></div>
  <div th:replace="~{fragments/flash-messages :: alerts}"></div>

  <div class="card">
    <div class="card__body card__body--flush">
      <form id="anwesenheitsliste-form" method="post"
            th:action="${formMode == 'edit'} ? @{/berichte/anwesenheitslisten/{id}(id=${report.id},unit=${unitId})} : @{/berichte/anwesenheitslisten(unit=${unitId})}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <th:block th:replace="~{fragments/berichte-anwesenheit-form :: form}"></th:block>
      </form>
    </div>
  </div>

  <script th:src="@{/js/combo-suggest.js}" defer></script>
  <script th:src="@{/js/berichte-api-base.js}" defer></script>
  <script th:src="@{/js/berichte-einsatz-form.js}" defer></script>
  <script th:src="@{/js/berichte-kraefte.js}" defer></script>
  <script th:src="@{/js/berichte-kraefte-foreign.js}" defer></script>
  <script th:src="@{/js/berichte-geraete.js}" defer></script>
  <script th:if="${report != null}" th:src="@{/js/berichte-anhaenge.js}" defer></script>
</main>
</html>
