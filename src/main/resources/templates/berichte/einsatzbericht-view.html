<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(${pageTitle}, ~{::main})}">
<main class="einsatzbericht-form-page einsatzbericht-view-page">
  <div class="page-header">
    <div>
      <a class="btn btn--outline btn--sm page-back" th:if="${backUrl != null}" th:href="${backUrl}">← Zurück</a>
      <a class="btn btn--outline btn--sm page-back" th:unless="${backUrl != null}"
         th:href="@{/berichte(unit=${unitId}, tab='einsatz')}">← Zurück</a>
      <h2 th:text="${pageTitle}">Einsatzbericht</h2>
      <p th:text="${pageSubtitle}">Anzeige</p>
    </div>
    <div class="einsatzbericht-form-actions">
      <span class="incident-status-pill incident-status-pill--header"
            th:classappend="${' incident-status-pill--' + report.status.cssModifier()}"
            th:text="${report.status.label()}">Entwurf</span>
      <a class="btn btn--outline"
         th:href="@{/berichte/einsatzberichte/{id}/pdf(id=${report.id},unit=${unitId})}">PDF herunterladen</a>
      <th:block th:replace="~{fragments/berichte-print-form :: button(
        @{/berichte/einsatzberichte/{id}/drucken(id=${report.id})},
        ${unitId},
        @{/berichte/einsatzberichte/{id}(id=${report.id}, unit=${unitId})}
      )}"></th:block>
      <a class="btn btn--primary" th:if="${canEditReport}"
         th:href="@{/berichte/einsatzberichte/{id}/bearbeiten(id=${report.id},unit=${unitId})}">Bearbeiten</a>
      <form th:if="${canRelease}" method="post"
            th:action="@{/berichte/einsatzberichte/{id}/freigeben(id=${report.id})}"
            class="bar-form"
            data-confirm-einsatz-release
            th:attr="data-release-create-geraetewart=${releaseDefaultCreateGeraetewart},
                     data-release-print-report=${releaseDefaultPrintReport},
                     data-release-print-geraetewart=${releaseDefaultPrintGeraetewart},
                     data-release-print-maengel=${releaseDefaultPrintMaengel},
                     data-release-has-material-damages=${releaseHasMaterialDamages},
                     data-release-has-deployed-equipment=${releaseHasDeployedEquipment}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <input type="hidden" name="unit" th:value="${unitId}"/>
        <input type="hidden" name="returnUrl" th:value="${einsatzListPath != null ? einsatzListPath : '/berichte?tab=einsatz'}"/>
        <button type="submit" class="btn btn--primary btn--success">Freigeben</button>
      </form>
      <form th:if="${canArchive}" method="post"
            th:action="@{/berichte/einsatzberichte/{id}/archivieren(id=${report.id})}"
            class="bar-form"
            data-confirm
            data-confirm-title="Einsatzbericht ins Archiv verschieben?"
            data-confirm-message="Der Bericht wird ins Archiv verschoben und erscheint standardmäßig nicht mehr in der aktiven Liste."
            data-confirm-label="Ins Archiv verschieben">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <input type="hidden" name="unit" th:value="${unitId}"/>
        <input type="hidden" name="returnUrl" th:value="${einsatzListPath != null ? einsatzListPath : '/berichte?tab=einsatz'}"/>
        <button type="submit" class="btn btn--outline">Ins Archiv verschieben</button>
      </form>
      <form th:if="${canDeleteReport}" method="post"
            th:action="@{/berichte/einsatzberichte/{id}/delete(id=${report.id})}"
            class="bar-form"
            data-confirm
            data-confirm-title="Einsatzbericht löschen?"
            data-confirm-message="Diese Aktion kann nicht rückgängig gemacht werden."
            data-confirm-label="Löschen"
            data-confirm-variant="danger">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <input type="hidden" name="unit" th:value="${unitId}"/>
        <input type="hidden" name="returnUrl" th:value="${einsatzListPath != null ? einsatzListPath : '/berichte?tab=einsatz'}"/>
        <button type="submit" class="btn btn--danger">Löschen</button>
      </form>
    </div>
  </div>

  <div th:replace="~{fragments/testmode-banner :: banner}"></div>
  <div th:replace="~{fragments/flash-messages :: alerts}"></div>

  <div class="card">
    <div class="card__body card__body--flush">
      <div id="einsatzbericht-view" class="einsatzbericht-form--view">
        <th:block th:replace="~{fragments/berichte-einsatz-form :: form}"></th:block>
      </div>
    </div>
  </div>

  <th:block th:replace="~{fragments/berichte-einsatz-changes :: historySection(${report}, ${reportChanges})}"></th:block>

  <script th:src="@{/js/berichte-einsatz-form.js}" defer></script>
  <script th:src="@{/js/berichte-kraefte.js}" defer></script>
  <script th:src="@{/js/berichte-kraefte-foreign.js}" defer></script>
  <script th:src="@{/js/berichte-geraete.js}" defer></script>
  <script th:src="@{/js/berichte-schaeden.js}" defer></script>
  <script th:src="@{/js/berichte-anhaenge.js}" defer></script>
</main>
</html>
