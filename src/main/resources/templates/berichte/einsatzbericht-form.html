<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(${pageTitle}, ~{::main})}">
<main class="einsatzbericht-form-page">
  <div class="page-header">
    <div>
      <h2 th:text="${pageTitle}">Neuer Einsatzbericht</h2>
      <p th:text="${pageSubtitle}">Entwurf</p>
    </div>
    <div class="einsatzbericht-form-actions">
      <a class="btn btn--outline" th:href="@{/berichte(unit=${unitId}, tab='einsatz')}">Abbrechen</a>
      <form th:if="${formMode == 'edit' and canArchive}" method="post"
            th:action="@{/berichte/einsatzberichte/{id}/archivieren(id=${report.id})}"
            class="bar-form"
            data-confirm
            data-confirm-title="Einsatzbericht ins Archiv verschieben?"
            data-confirm-message="Der Bericht wird ins Archiv verschoben und erscheint standardmäßig nicht mehr in der aktiven Liste."
            data-confirm-label="Ins Archiv verschieben">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <input type="hidden" name="unit" th:value="${unitId}"/>
        <input type="hidden" name="returnUrl" th:value="@{/berichte(unit=${unitId}, tab='einsatz')}"/>
        <button type="submit" class="btn btn--outline">Ins Archiv verschieben</button>
      </form>
      <form th:if="${formMode == 'edit' and canDeleteReport}" method="post"
            th:action="@{/berichte/einsatzberichte/{id}/delete(id=${report.id})}"
            class="bar-form"
            data-confirm
            data-confirm-title="Einsatzbericht löschen?"
            data-confirm-message="Diese Aktion kann nicht rückgängig gemacht werden."
            data-confirm-label="Löschen"
            data-confirm-variant="danger">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <input type="hidden" name="unit" th:value="${unitId}"/>
        <button type="submit" class="btn btn--danger">Löschen</button>
      </form>
      <a class="btn btn--outline" th:if="${formMode == 'edit' and report != null}"
         th:href="@{/berichte/einsatzberichte/{id}/pdf(id=${report.id},unit=${unitId})}">PDF herunterladen</a>
      <form th:if="${formMode == 'edit' and report != null}" method="post"
            th:action="@{/berichte/einsatzberichte/{id}/drucken(id=${report.id})}"
            class="bar-form">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <input type="hidden" name="unit" th:value="${unitId}"/>
        <input type="hidden" name="returnUrl"
               th:value="@{/berichte/einsatzberichte/{id}/bearbeiten(id=${report.id}, unit=${unitId})}"/>
        <button type="submit" class="btn btn--outline">Drucken</button>
      </form>
      <button type="submit" class="btn btn--primary" form="einsatzbericht-form">Speichern</button>
    </div>
  </div>

  <div th:replace="~{fragments/testmode-banner :: banner}"></div>
  <div th:replace="~{fragments/flash-messages :: alerts}"></div>

  <div class="card">
    <div class="card__body card__body--flush">
      <form id="einsatzbericht-form" method="post"
            th:action="${formMode == 'edit' and report != null} ? @{/berichte/einsatzberichte/{id}(id=${report.id},unit=${unitId})} : @{/berichte/einsatzberichte(unit=${unitId})}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <th:block th:replace="~{fragments/berichte-einsatz-form :: form}"></th:block>
        <div class="incident-edit-comment"
             th:if="${formMode == 'edit' and T(de.feuerwehr.manager.berichte.EinsatzberichtAccess).showChangeHistory(report)}">
          <label for="changeComment">Kommentar zur Änderung (optional)</label>
          <textarea id="changeComment" name="changeComment" rows="2" class="field"
                    placeholder="Was wurde geändert und warum?"></textarea>
        </div>
      </form>
    </div>
  </div>

  <th:block th:replace="~{fragments/berichte-einsatz-changes :: historySection(${report}, ${reportChanges})}"></th:block>

  <script th:src="@{/js/combo-suggest.js}" defer></script>
  <script th:src="@{/js/berichte-einsatz-form.js}" defer></script>
  <script th:src="@{/js/berichte-kraefte.js}" defer></script>
  <script th:src="@{/js/berichte-kraefte-foreign.js}" defer></script>
  <script th:src="@{/js/berichte-geraete.js}" defer></script>
  <script th:src="@{/js/berichte-schaeden.js}" defer></script>
  <script th:if="${report != null}" th:src="@{/js/berichte-anhaenge.js}" defer></script>
</main>
</html>
