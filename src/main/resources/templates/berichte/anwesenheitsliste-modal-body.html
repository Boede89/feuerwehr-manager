<div xmlns:th="http://www.thymeleaf.org" class="einsatzbericht-modal-root einsatzbericht-form-page"
     data-berichte-form="anwesenheit"
     th:attr="data-title=${modalTitle},
              data-can-edit=${canEditReport},
              data-can-release=${canRelease},
              data-can-archive=${canArchive},
              data-can-delete=${canDeleteReport},
              data-report-id=${report.id}">
  <meta name="berichte-api-base" content="/berichte/anwesenheitslisten"/>
  <div id="einsatzbericht-view" class="einsatzbericht-form--view">
    <th:block th:replace="~{fragments/berichte-anwesenheit-form :: form}"></th:block>
  </div>
</div>
