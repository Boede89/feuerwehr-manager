<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<th:block th:fragment="picker(persons, paramName, selectedIds)">
  <div class="atemschutz-person-search-wrap" th:if="${!#lists.isEmpty(persons)}">
    <input type="search" class="field berichte-person-search" placeholder="Name suchen …" autocomplete="off"/>
  </div>
  <div class="user-picker user-picker--scroll" th:if="${!#lists.isEmpty(persons)}">
    <label class="user-picker__item" th:each="p : ${persons}"
           th:attr="data-search=${#strings.toLowerCase(p.anwesenheitDisplayName())}">
      <input type="checkbox" th:name="${paramName}" th:value="${p.id}"
             th:checked="${selectedIds != null and selectedIds.contains(p.id)}"/>
      <span class="user-picker__text">
        <span class="user-picker__name" th:text="${p.anwesenheitDisplayName()}">Name</span>
      </span>
    </label>
  </div>
  <p class="hint berichte-person-search-empty" hidden style="margin:0;">Keine Treffer.</p>
  <p class="hint" th:if="${#lists.isEmpty(persons)}" style="margin:0;">Keine Personen in dieser Einheit.</p>
</th:block>
</html>
