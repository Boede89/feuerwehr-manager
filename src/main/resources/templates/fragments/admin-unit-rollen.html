<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="panel">
  <div class="card">
    <div class="card__header card__header--toolbar">
      <span>Rollenverwaltung</span>
      <button type="button" class="btn btn--primary btn--sm" data-open-modal="modal-unit-role">+ Rolle anlegen</button>
    </div>
    <div class="card__body card__body--flush">
      <div class="table-wrapper" th:if="${!#lists.isEmpty(unitRoles)}">
        <table class="table">
          <thead>
          <tr>
            <th class="table-order-cell">Reihenfolge</th>
            <th>Rollenname</th>
            <th>Typ</th>
            <th>Module</th>
            <th>Aktionen</th>
          </tr>
          </thead>
          <tbody>
          <tr th:each="r, stat : ${unitRoles}">
            <th:block th:replace="~{fragments/admin-table-order :: cell(
                moveUrl=@{/admin/unit/roles/move},
                unitId=${unitId},
                itemIdParam='roleId',
                itemId=${r.id},
                disableUp=${r.systemRole or stat.first or (stat.index > 0 and unitRoles[stat.index - 1].systemRole)},
                disableDown=${r.systemRole or stat.last})}"></th:block>
            <td>
              <strong th:text="${r.name}">Rolle</strong>
              <span class="badge badge--muted" th:if="${r.systemRole}">Standard</span>
            </td>
            <td>
              <span class="text-subtle text-sm" th:if="${r.systemRole}">Standardrolle</span>
              <span class="badge-success" th:if="${!r.systemRole and r.roleType.name() == 'DIENSTGRAD'}">Dienstgrad</span>
              <span class="badge-warning" th:if="${!r.systemRole and r.roleType.name() == 'FUNKTION'}">Zusatzfunktion</span>
            </td>
            <td th:classappend="${permissionLabelsByRoleId.get(r.id) == 'keine'} ? ' text-subtle' : ''"
                th:text="${permissionLabelsByRoleId.get(r.id)}">—</td>
            <td>
              <div class="btn-group">
                <button type="button" class="btn btn--outline btn--sm" data-open-modal="modal-unit-role"
                        th:data-role-id="${r.id}"
                        th:data-role-name="${r.name}"
                        th:data-role-type="${r.roleType.name()}"
                        th:data-role-system="${r.systemRole}"
                        th:data-role-perms="${r.permissionsJson}">Bearbeiten</button>
                <form th:if="${!r.systemRole}" method="post" th:action="@{/admin/unit/roles/delete}" class="table-inline-form"
                      onsubmit="return confirm('Rolle wirklich löschen?');">
                  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                  <input type="hidden" name="unit" th:value="${unitId}"/>
                  <input type="hidden" name="roleId" th:value="${r.id}"/>
                  <button type="submit" class="btn btn--danger btn--sm">Löschen</button>
                </form>
              </div>
            </td>
          </tr>
          </tbody>
        </table>
      </div>
      <p class="table-empty" th:if="${#lists.isEmpty(unitRoles)}">Noch keine Rollen angelegt.</p>
    </div>
  </div>

  <div id="modal-unit-role" class="modal-overlay">
    <div class="modal" role="dialog">
      <div class="modal__header">
        <h3 id="modal-unit-role-title">Rolle anlegen</h3>
        <button type="button" class="modal__close" data-close-modal aria-label="Schließen">✕</button>
      </div>
      <form id="form-unit-role" method="post" th:action="@{/admin/unit/roles}"
            th:attr="data-create-action=@{/admin/unit/roles}, data-update-action=@{/admin/unit/roles/update}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <input type="hidden" name="unit" th:value="${unitId}"/>
        <input type="hidden" name="roleId" id="unit-role-id" value="" disabled/>
        <div class="modal__body">
          <div class="form-group" id="unit-role-name-group">
            <label for="unit-role-name">Rollenname</label>
            <input id="unit-role-name" name="name" type="text" required maxlength="128" placeholder="z. B. Truppführer" autocomplete="off"/>
          </div>
          <div class="form-group" id="unit-role-type-group">
            <label for="unit-role-type">Typ</label>
            <select id="unit-role-type" name="roleType">
              <option value="DIENSTGRAD">Dienstgrad (z. B. Truppführer, Gruppenführer)</option>
              <option value="FUNKTION">Zusatzfunktion (z. B. Gerätewart, Lagerverwalter)</option>
            </select>
          </div>
          <div class="form-group">
            <label>Module</label>
            <div class="admin-check-list" id="unit-role-perms">
              <label class="check-label" th:each="opt : ${rolePermissionOptions}">
                <input type="checkbox" name="permissions" th:value="${opt.value}"/>
                <span th:text="${opt.label}">Modul</span>
              </label>
            </div>
          </div>
        </div>
        <div class="modal__footer">
          <button type="submit" class="btn btn--primary">Speichern</button>
          <button type="button" class="btn btn--outline" data-close-modal>Abbrechen</button>
        </div>
      </form>
    </div>
  </div>
</th:block>
</body>
</html>
