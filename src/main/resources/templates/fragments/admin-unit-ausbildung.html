<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="panel">
  <div class="card">
    <div class="card__header card__header--toolbar">
      <span>Qualifikationen</span>
    </div>
    <div class="card__body">
      <form method="post" th:action="@{/admin/unit/qualifications}" class="form-grid">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <input type="hidden" name="unit" th:value="${unitId}"/>
        <div class="form-group">
          <label for="qualName">Neue Qualifikation</label>
          <input id="qualName" name="name" type="text" required maxlength="128" placeholder="z. B. Gruppenführer"/>
        </div>
        <div class="form-group form-group--submit">
          <button type="submit" class="btn btn--primary">Anlegen</button>
        </div>
      </form>
      <div class="table-wrapper mt-md">
        <table class="table">
          <thead>
          <tr><th>Name</th><th>Status</th></tr>
          </thead>
          <tbody>
          <tr th:if="${#lists.isEmpty(qualificationTypes)}">
            <td colspan="2" class="table-empty">Noch keine Qualifikationen.</td>
          </tr>
          <tr th:each="t : ${qualificationTypes}">
            <td th:text="${t.name}">Qualifikation</td>
            <td>
              <span class="badge" th:classappend="${t.active} ? ' active' : ' inactive'"
                    th:text="${t.active} ? 'Aktiv' : 'Inaktiv'">Status</span>
            </td>
          </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card__header">Lehrgänge</div>
    <div class="card__body">
      <form method="post" th:action="@{/admin/unit/courses}" class="form-grid">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <input type="hidden" name="unit" th:value="${unitId}"/>
        <div class="form-group">
          <label for="courseName">Neuer Lehrgang</label>
          <input id="courseName" name="name" type="text" required maxlength="255" placeholder="z. B. Truppführer-Lehrgang"/>
        </div>
        <div class="form-group">
          <label for="courseQual">Qualifikation (optional)</label>
          <select id="courseQual" name="qualificationTypeId">
            <option value="">— keine Zuordnung —</option>
            <option th:each="t : ${qualificationTypes}" th:value="${t.id}" th:text="${t.name}">Quali</option>
          </select>
        </div>
        <div class="form-group form-group--submit">
          <button type="submit" class="btn btn--primary">Anlegen</button>
        </div>
      </form>
      <div class="table-wrapper mt-md">
        <table class="table">
          <thead>
          <tr>
            <th>Name</th>
            <th>Qualifikation</th>
            <th>Status</th>
          </tr>
          </thead>
          <tbody>
          <tr th:if="${#lists.isEmpty(courses)}">
            <td colspan="3" class="table-empty">Noch keine Lehrgänge.</td>
          </tr>
          <tr th:each="c : ${courses}">
            <td th:text="${c.name}">Lehrgang</td>
            <td class="text-muted text-sm"
                th:text="${c.qualificationType != null ? c.qualificationType.name : '—'}">—</td>
            <td>
              <span class="badge" th:classappend="${c.active} ? ' active' : ' inactive'"
                    th:text="${c.active} ? 'Aktiv' : 'Inaktiv'">Status</span>
            </td>
          </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</th:block>
</body>
</html>
