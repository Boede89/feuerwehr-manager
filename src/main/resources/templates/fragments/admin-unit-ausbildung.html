<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="panel">
  <div class="card">
    <div class="card__header card__header--toolbar">
      <span th:text="|Qualifikationen (${qualificationTypes != null ? #lists.size(qualificationTypes) : 0})|">Qualifikationen</span>
      <button type="button" class="btn btn--primary btn--sm" data-open-modal="modal-qualification-new">+ Qualifikation</button>
    </div>
    <div class="card__body card__body--flush">
      <div class="table-wrapper" th:if="${qualificationTypes != null and !#lists.isEmpty(qualificationTypes)}">
        <table class="table" id="qualification-table">
          <thead>
          <tr>
            <th class="table__th-sort" scope="col" data-sort-key="name" tabindex="0" role="columnheader"
                aria-sort="none">Name</th>
            <th scope="col">Status</th>
          </tr>
          </thead>
          <tbody id="qualification-tbody">
          <tr th:each="t : ${qualificationTypes}" class="qualification-row"
              th:attr="data-sort-name=${t.name}">
            <td><strong th:text="${t.name}">Qualifikation</strong></td>
            <td>
              <span class="badge" th:classappend="${t.active} ? ' active' : ' inactive'"
                    th:text="${t.active} ? 'Aktiv' : 'Inaktiv'">Status</span>
            </td>
          </tr>
          </tbody>
        </table>
      </div>
      <p class="table-empty" th:if="${qualificationTypes == null or #lists.isEmpty(qualificationTypes)}">
        Noch keine Qualifikationen. Klicken Sie auf <strong>+ Qualifikation</strong>.
      </p>
    </div>
  </div>

  <div class="card mt-md">
    <div class="card__header card__header--toolbar">
      <span th:text="|Lehrgänge (${courses != null ? #lists.size(courses) : 0})|">Lehrgänge</span>
      <button type="button" class="btn btn--primary btn--sm" data-open-modal="modal-course-new">+ Lehrgang</button>
    </div>
    <div class="card__body card__body--flush">
      <div class="table-wrapper" th:if="${courses != null and !#lists.isEmpty(courses)}">
        <table class="table" id="course-table">
          <thead>
          <tr>
            <th class="table__th-sort" scope="col" data-sort-key="name" tabindex="0" role="columnheader"
                aria-sort="none">Name</th>
            <th class="table__th-sort" scope="col" data-sort-key="qualification" tabindex="0" role="columnheader"
                aria-sort="none">Qualifikation</th>
            <th scope="col">Status</th>
          </tr>
          </thead>
          <tbody id="course-tbody">
          <tr th:each="c : ${courses}" class="course-row"
              th:attr="data-sort-name=${c.name},
                       data-sort-qualification=${c.qualificationType != null ? c.qualificationType.name : ''}">
            <td><strong th:text="${c.name}">Lehrgang</strong></td>
            <td class="text-muted text-sm"
                th:text="${c.qualificationType != null ? c.qualificationType.name : '—'}">—</td>
            <td>
              <span class="badge" th:classappend="${c.active} ? ' active' : ' inactive'"
                    th:text="${c.active} ? 'Aktiv' : 'Inaktiv'">Status</span>
            </td>
          </tr>
          </tbody>
        </table>
      </div>
      <p class="table-empty" th:if="${courses == null or #lists.isEmpty(courses)}">
        Noch keine Lehrgänge. Klicken Sie auf <strong>+ Lehrgang</strong>.
      </p>
    </div>
  </div>

  <div id="modal-qualification-new" class="modal-overlay">
    <div class="modal" role="dialog">
      <div class="modal__header">
        <h3>Qualifikation anlegen</h3>
        <button type="button" class="modal__close" data-close-modal>✕</button>
      </div>
      <form method="post" th:action="@{/admin/unit/qualifications}" id="form-qualification-new">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <input type="hidden" name="unit" th:value="${unitId}"/>
        <div class="modal__body">
          <div class="form-group">
            <label for="qualNameNew">Name <span class="required">*</span></label>
            <input id="qualNameNew" name="name" type="text" required maxlength="128"
                   placeholder="z. B. Gruppenführer" autofocus/>
          </div>
        </div>
        <div class="modal__footer">
          <button type="submit" class="btn btn--primary">Speichern</button>
          <button type="button" class="btn btn--outline" data-close-modal>Abbrechen</button>
        </div>
      </form>
    </div>
  </div>

  <div id="modal-course-new" class="modal-overlay">
    <div class="modal" role="dialog">
      <div class="modal__header">
        <h3>Lehrgang anlegen</h3>
        <button type="button" class="modal__close" data-close-modal>✕</button>
      </div>
      <form method="post" th:action="@{/admin/unit/courses}" id="form-course-new">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <input type="hidden" name="unit" th:value="${unitId}"/>
        <div class="modal__body">
          <div class="form-group">
            <label for="courseNameNew">Name <span class="required">*</span></label>
            <input id="courseNameNew" name="name" type="text" required maxlength="255"
                   placeholder="z. B. Truppführer-Lehrgang"/>
          </div>
          <div class="form-group">
            <label for="courseQualNew">Qualifikation (optional)</label>
            <select id="courseQualNew" name="qualificationTypeId">
              <option value="">— keine Zuordnung —</option>
              <option th:each="t : ${qualificationTypes}" th:value="${t.id}" th:text="${t.name}">Quali</option>
            </select>
          </div>
        </div>
        <div class="modal__footer">
          <button type="submit" class="btn btn--primary">Speichern</button>
          <button type="button" class="btn btn--outline" data-close-modal>Abbrechen</button>
        </div>
      </form>
    </div>
  </div>
</th:block>
</body>
</html>
