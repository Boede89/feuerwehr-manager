<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="panel">
  <div class="card">
    <div class="card__header card__header--toolbar">
      <span>Einheiten</span>
      <button type="button" class="btn btn--primary btn--sm" data-open-modal="modal-new-unit">+ Einheit anlegen</button>
    </div>

    <div class="card__body card__body--flush">
      <div class="table-wrapper" th:if="${!#lists.isEmpty(unitRows)}">
        <table class="table">
          <thead>
          <tr>
            <th>Name</th>
            <th>Einheitsadmins</th>
            <th>Status</th>
            <th>Aktionen</th>
          </tr>
          </thead>
          <tbody>
          <tr th:each="row : ${unitRows}">
            <td>
              <strong th:text="${row.name}">Einheit</strong>
              <span class="badge badge--muted" th:if="${row.testData}">Test</span>
            </td>
            <td class="text-muted text-sm" th:text="${row.unitAdmins}">—</td>
            <td>
              <span class="badge" th:classappend="${row.active} ? ' active' : ' inactive'"
                    th:text="${row.active} ? 'Aktiv' : 'Inaktiv'">Status</span>
            </td>
            <td>
              <div class="btn-group">
                <button type="button" class="btn btn--outline btn--sm"
                        data-open-modal="modal-edit-unit"
                        th:data-unit-id="${row.id}"
                        th:data-unit-name="${row.name}"
                        th:data-unit-active="${row.active}">Bearbeiten</button>
                <form method="post" th:action="@{/admin/global/units/delete}" class="table-inline-form"
                      onsubmit="return confirm('Diese Einheit wirklich löschen? Alle zugehörigen Daten werden entfernt.');">
                  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                  <input type="hidden" name="unitId" th:value="${row.id}"/>
                  <button type="submit" class="btn btn--danger btn--sm">Löschen</button>
                </form>
              </div>
            </td>
          </tr>
          </tbody>
        </table>
      </div>
      <p class="table-empty" th:if="${#lists.isEmpty(unitRows)}">Noch keine Einheit angelegt.</p>
    </div>
  </div>

  <!-- Modal: Neue Einheit -->
  <div id="modal-new-unit" class="modal-overlay">
    <div class="modal" role="dialog" aria-labelledby="modal-new-unit-title">
      <div class="modal__header">
        <h3 id="modal-new-unit-title">Neue Einheit anlegen</h3>
        <button type="button" class="modal__close" data-close-modal aria-label="Schließen">✕</button>
      </div>
      <form method="post" th:action="@{/admin/global/units}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div class="modal__body">
          <div class="form-group">
            <label for="newUnitName">Name der Einheit</label>
            <input id="newUnitName" name="name" type="text" required maxlength="255" placeholder="z. B. FF Musterstadt" autofocus/>
          </div>
        </div>
        <div class="modal__footer">
          <button type="submit" class="btn btn--primary">Anlegen</button>
          <button type="button" class="btn btn--outline" data-close-modal>Abbrechen</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal: Einheit bearbeiten -->
  <div id="modal-edit-unit" class="modal-overlay">
    <div class="modal" role="dialog" aria-labelledby="modal-edit-unit-title">
      <div class="modal__header">
        <h3>Einheit bearbeiten — <span id="edit-unit-title">—</span></h3>
        <button type="button" class="modal__close" data-close-modal aria-label="Schließen">✕</button>
      </div>
      <form id="form-edit-unit" method="post" th:action="@{/admin/global/units/update}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <input type="hidden" name="unitId" value=""/>
        <div class="modal__body">
          <div class="form-group">
            <label for="editUnitName">Name der Einheit</label>
            <input id="editUnitName" name="name" type="text" required maxlength="255"/>
          </div>
          <label class="checkbox-row">
            <input type="checkbox" name="active" value="true"/>
            Aktiv
          </label>
        </div>
        <div class="modal__footer">
          <button type="submit" class="btn btn--primary">Speichern</button>
          <button type="button" class="btn btn--outline" data-close-modal>Abbrechen</button>
        </div>
      </form>
    </div>
  </div>
</th:block>
</body>
</html>
