<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="panel">
  <div class="card">
    <div class="card__header card__header--toolbar">
      <span>Einheiten</span>
    </div>
    <div class="card__body">
      <form method="post" th:action="@{/admin/global/units}" class="form-grid form-grid--inline-toolbar">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div class="form-group form-group--grow">
          <label for="newUnitName">Neue Einheit</label>
          <input id="newUnitName" name="name" type="text" required maxlength="255" placeholder="z. B. FF Musterstadt"/>
        </div>
        <div class="form-group form-group--actions">
          <label>&nbsp;</label>
          <button type="submit" class="btn btn--primary">+ Einheit anlegen</button>
        </div>
      </form>
    </div>
    <div class="card__body card__body--flush">
      <div class="table-wrapper" th:if="${!#lists.isEmpty(unitRows)}">
        <table class="table">
          <thead>
          <tr>
            <th>Name</th>
            <th>Einheitsadmins</th>
            <th>Status</th>
            <th>Aktionen</th>
          </tr>
          </thead>
          <tbody>
          <tr th:each="row : ${unitRows}">
            <td>
              <strong th:text="${row.name}">Einheit</strong>
              <span class="badge badge--muted" th:if="${row.testData}">Test</span>
            </td>
            <td class="text-muted text-sm" th:text="${row.unitAdmins}">—</td>
            <td>
              <span class="badge" th:classappend="${row.active} ? ' active' : ' inactive'"
                    th:text="${row.active} ? 'Aktiv' : 'Inaktiv'">Status</span>
            </td>
            <td>
              <details class="table-inline-edit">
                <summary class="btn btn--outline btn--sm">Bearbeiten</summary>
                <form method="post" th:action="@{/admin/global/units/update}" class="inline-edit-form">
                  <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                  <input type="hidden" name="unitId" th:value="${row.id}"/>
                  <div class="form-group">
                    <label th:for="${'unitName-' + row.id}">Name</label>
                    <input th:id="${'unitName-' + row.id}" name="name" type="text" required maxlength="255" th:value="${row.name}"/>
                  </div>
                  <label class="checkbox-row">
                    <input type="checkbox" name="active" value="true" th:checked="${row.active}"/>
                    Aktiv
                  </label>
                  <button type="submit" class="btn btn--primary btn--sm">Speichern</button>
                </form>
              </details>
              <form method="post" th:action="@{/admin/global/units/delete}" class="table-inline-form"
                    onsubmit="return confirm('Diese Einheit wirklich löschen? Alle zugehörigen Daten werden entfernt.');">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <input type="hidden" name="unitId" th:value="${row.id}"/>
                <button type="submit" class="btn btn--outline btn--sm btn--danger-text">Löschen</button>
              </form>
            </td>
          </tr>
          </tbody>
        </table>
      </div>
      <p class="table-empty" th:if="${#lists.isEmpty(unitRows)}">Noch keine Einheit angelegt.</p>
    </div>
  </div>
</th:block>
</body>
</html>
