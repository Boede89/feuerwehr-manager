<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="panel">
  <div class="card">
    <div class="card__header">SMTP (global)</div>
    <div class="card__body">
      <p class="hint">Zentraler Mailversand für die gesamte Installation. Einheitsbezogene SMTP-Einstellungen folgen später.</p>
      <form method="post" th:action="@{/admin/global/smtp}" class="form-grid">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div class="form-group">
          <label for="smtpHost">SMTP-Host</label>
          <input id="smtpHost" name="smtpHost" type="text" th:value="${globalSettings.smtpHost}" placeholder="smtp.example.de"/>
        </div>
        <div class="form-group">
          <label for="smtpPort">Port</label>
          <input id="smtpPort" name="smtpPort" type="number" min="1" max="65535"
                 th:value="${globalSettings.smtpPort != null ? globalSettings.smtpPort : 587}"/>
        </div>
        <div class="form-group">
          <label for="smtpUsername">Benutzername</label>
          <input id="smtpUsername" name="smtpUsername" type="text" autocomplete="off" th:value="${globalSettings.smtpUsername}"/>
        </div>
        <div class="form-group">
          <label for="smtpPassword">Passwort</label>
          <input id="smtpPassword" name="smtpPassword" type="password" autocomplete="new-password"
                 placeholder="Leer lassen = unverändert"/>
          <p class="hint" th:if="${smtpPasswordConfigured}">Passwort ist hinterlegt.</p>
        </div>
        <div class="form-group">
          <label for="smtpFromEmail">Absender E-Mail</label>
          <input id="smtpFromEmail" name="smtpFromEmail" type="email" th:value="${globalSettings.smtpFromEmail}"/>
        </div>
        <div class="form-group">
          <label for="smtpFromName">Absender Name</label>
          <input id="smtpFromName" name="smtpFromName" type="text" th:value="${globalSettings.smtpFromName}"/>
        </div>
        <div class="form-group">
          <label for="smtpEncryption">Verschlüsselung</label>
          <select id="smtpEncryption" name="smtpEncryption">
            <option value="TLS" th:selected="${globalSettings.smtpEncryption == 'TLS' or globalSettings.smtpEncryption == null}">TLS</option>
            <option value="SSL" th:selected="${globalSettings.smtpEncryption == 'SSL'}">SSL</option>
            <option value="NONE" th:selected="${globalSettings.smtpEncryption == 'NONE'}">Keine</option>
          </select>
        </div>
        <div class="form-group form-group--full">
          <button type="submit" class="btn btn--primary">SMTP speichern</button>
        </div>
      </form>
    </div>
  </div>
</th:block>
</body>
</html>
