<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="panel">
  <div class="card">
    <div class="card__header">Stammdaten der Einheit</div>
    <div class="card__body">
      <form method="post" th:action="@{/admin/unit/config}" class="form-grid">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <input type="hidden" name="unit" th:value="${unitId}"/>
        <div class="form-group form-group--full">
          <label for="unitName">Name der Einheit</label>
          <input id="unitName" name="name" type="text" required maxlength="255" th:value="${unit.name}"/>
        </div>
        <div class="form-group">
          <label for="unitStreet">Straße &amp; Hausnummer</label>
          <input id="unitStreet" name="street" type="text" maxlength="255" th:value="${unit.street}"/>
        </div>
        <div class="form-group">
          <label for="unitPostalCity">PLZ &amp; Ort</label>
          <input id="unitPostalCity" name="postalCity" type="text" maxlength="255" th:value="${unit.postalCity}"/>
        </div>
        <div class="form-group form-group--full form-group--submit">
          <button type="submit" class="btn btn--primary">Stammdaten speichern</button>
        </div>
      </form>
    </div>
  </div>

  <div class="card">
    <div class="card__header">Wappen / Logo der Einheit</div>
    <div class="card__body">
      <p class="hint">Erscheint künftig in einheitsbezogenen Ansichten. PNG mit transparentem Hintergrund empfohlen, max. 200 KB.</p>
      <div class="admin-preview-row" th:if="${hasUnitLogo}">
        <img th:src="${unit.logoBase64}" alt="Wappen-Vorschau" class="admin-logo-preview"/>
      </div>
      <form method="post" th:action="@{/admin/unit/logo}" enctype="multipart/form-data" class="form-grid">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <input type="hidden" name="unit" th:value="${unitId}"/>
        <div class="form-group form-group--full">
          <label for="unitLogoFile">Bilddatei (PNG, JPG, WebP)</label>
          <input id="unitLogoFile" name="logoFile" type="file" accept="image/*" required/>
        </div>
        <div class="form-group form-group--full form-group--submit">
          <button type="submit" class="btn btn--primary">Wappen speichern</button>
        </div>
      </form>
      <form method="post" th:action="@{/admin/unit/logo/delete}" class="mt-sm" th:if="${hasUnitLogo}"
            onsubmit="return confirm('Wappen wirklich entfernen?');">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <input type="hidden" name="unit" th:value="${unitId}"/>
        <button type="submit" class="btn btn--outline">Wappen entfernen</button>
      </form>
    </div>
  </div>
</th:block>
</body>
</html>
