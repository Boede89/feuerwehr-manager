<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="cell(moveUrl, unitId, itemIdParam, itemId, disableUp, disableDown)">
  <td class="table-order-cell">
    <div class="table-order-actions">
      <form method="post" th:action="${moveUrl}" class="table-inline-form">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <input type="hidden" name="unit" th:value="${unitId}"/>
        <input type="hidden" th:name="${itemIdParam}" th:value="${itemId}"/>
        <input type="hidden" name="direction" value="up"/>
        <button type="submit" class="btn btn--icon btn--outline btn--sm" th:disabled="${disableUp}"
                title="Nach oben" aria-label="Nach oben">↑</button>
      </form>
      <form method="post" th:action="${moveUrl}" class="table-inline-form">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <input type="hidden" name="unit" th:value="${unitId}"/>
        <input type="hidden" th:name="${itemIdParam}" th:value="${itemId}"/>
        <input type="hidden" name="direction" value="down"/>
        <button type="submit" class="btn btn--icon btn--outline btn--sm" th:disabled="${disableDown}"
                title="Nach unten" aria-label="Nach unten">↓</button>
      </form>
    </div>
  </td>
</th:block>
</body>
</html>
