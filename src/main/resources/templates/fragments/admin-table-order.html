<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<!-- Einbettbare Reihenfolge-Steuerung (in btn-group oder Tabellenzeile) -->
<th:block th:fragment="controls(moveUrl, unitId, itemIdParam, itemId, disableUp, disableDown)">
  <div class="row-order" role="group" aria-label="Reihenfolge">
    <form method="post" th:action="${moveUrl}" class="table-inline-form">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <input type="hidden" name="unit" th:value="${unitId}"/>
      <input type="hidden" th:name="${itemIdParam}" th:value="${itemId}"/>
      <input type="hidden" name="direction" value="up"/>
      <button type="submit" class="row-order__btn" th:disabled="${disableUp}" title="Nach oben" aria-label="Nach oben">
        <span aria-hidden="true">▴</span>
      </button>
    </form>
    <form method="post" th:action="${moveUrl}" class="table-inline-form">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <input type="hidden" name="unit" th:value="${unitId}"/>
      <input type="hidden" th:name="${itemIdParam}" th:value="${itemId}"/>
      <input type="hidden" name="direction" value="down"/>
      <button type="submit" class="row-order__btn" th:disabled="${disableDown}" title="Nach unten" aria-label="Nach unten">
        <span aria-hidden="true">▾</span>
      </button>
    </form>
  </div>
</th:block>
</body>
</html>
