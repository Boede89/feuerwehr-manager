<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<!-- Nur einbinden über historySection – prüft Status (freigegeben/archiviert) zuverlässig im Wrapper. -->
<th:block th:fragment="historySection(report, changes)">
  <div th:if="${T(de.feuerwehr.manager.berichte.EinsatzberichtAccess).showChangeHistory(report)}">
    <div th:replace="~{fragments/berichte-einsatz-changes :: history(${changes})}"></div>
  </div>
</th:block>

<th:block th:fragment="history(changes)">
  <div class="card berichte-changes-card">
    <div class="card__body">
      <h4 class="berichte-changes-heading">Änderungshistorie</h4>
      <div class="berichte-changes-table-wrap" th:if="${!#lists.isEmpty(changes)}">
        <table class="data-table berichte-changes-table">
          <thead>
          <tr>
            <th class="berichte-changes-table__date">Datum</th>
            <th>Feld</th>
            <th>Alt</th>
            <th>Neu</th>
            <th class="berichte-changes-table__name">Name</th>
          </tr>
          </thead>
          <tbody>
          <th:block th:each="c : ${changes}">
            <tr th:each="f : ${c.fields}">
              <td class="berichte-changes-table__date"
                  th:text="${#temporals.format(c.createdAt, 'dd.MM.yyyy HH:mm')}">—</td>
              <td th:text="${f.fieldLabel}">Feld</td>
              <td class="berichte-change-fields__old"
                  th:text="${f.oldValue != null and !#strings.isEmpty(f.oldValue) ? f.oldValue : '—'}">—</td>
              <td class="berichte-change-fields__new"
                  th:text="${f.newValue != null and !#strings.isEmpty(f.newValue) ? f.newValue : '—'}">—</td>
              <td class="berichte-changes-table__name"
                  th:text="${c.changedByName != null and !#strings.isEmpty(c.changedByName) ? c.changedByName : '—'}">—</td>
            </tr>
            <tr th:if="${c.commentText != null and !#strings.isEmpty(c.commentText)}">
              <td class="berichte-changes-table__date"
                  th:text="${#temporals.format(c.createdAt, 'dd.MM.yyyy HH:mm')}">—</td>
              <td>Kommentar</td>
              <td class="berichte-change-fields__old">—</td>
              <td class="berichte-change-fields__new" th:text="${c.commentText}">—</td>
              <td class="berichte-changes-table__name"
                  th:text="${c.changedByName != null and !#strings.isEmpty(c.changedByName) ? c.changedByName : '—'}">—</td>
            </tr>
          </th:block>
          </tbody>
        </table>
      </div>
      <p class="hint berichte-changes-empty" th:if="${#lists.isEmpty(changes)}">Noch keine Änderungen protokolliert.</p>
    </div>
  </div>
</th:block>
</html>
