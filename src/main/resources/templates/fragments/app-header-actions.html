<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="actions">
  <span class="app-header__user" th:if="${currentUser != null}">
    <span class="app-header__user-dot"></span>
    <span th:text="${currentUser.displayName}">Benutzer</span>
  </span>
  <div class="bar-form unit-switch-wrap" th:if="${!unitSwitchDisabled and units != null}">
    <label for="unitSwitcher" class="sr-only">Einheit</label>
    <select class="unit-select unit-select-compact" id="unitSwitcher" name="unit" data-unit-switch
            aria-label="Einheit wählen">
      <option th:each="u : ${units}" th:value="${u.id}"
              th:selected="${unitId != null and u.id.equals(unitId)}"
              th:text="${u.name}">Einheit</option>
    </select>
  </div>
  <span class="app-header__unit-label" th:if="${unitSwitchDisabled and currentUnitName != null}"
        th:text="${currentUnitName}">Einheit</span>
  <form method="post" th:action="@{/logout}" class="bar-form" style="margin:0;">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    <button type="submit" class="app-header__logout">Abmelden</button>
  </form>
</th:block>
</body>
</html>
