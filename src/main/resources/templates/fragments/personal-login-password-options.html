<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<th:block th:fragment="options">
  <div class="form-group form-group--full login-password-options" id="login-password-options" hidden>
    <span class="form-label">Initialpasswort</span>
    <div class="radio-group">
      <label class="radio-row" th:if="${smtpConfigured}">
        <input type="radio" name="passwordDelivery" value="email"
               th:checked="${formPasswordDelivery == null or formPasswordDelivery == 'email'}"/>
        <span>Per E-Mail an die Person senden</span>
      </label>
      <label class="radio-row">
        <input type="radio" name="passwordDelivery" value="manual"
               th:checked="${!smtpConfigured or formPasswordDelivery == 'manual'}"/>
        <span>Selbst vergeben</span>
      </label>
    </div>
    <div class="form-group" id="manual-password-field" hidden>
      <label for="initialPassword">Passwort</label>
      <input id="initialPassword" name="initialPassword" type="password"
             th:minlength="${minPasswordLength}" autocomplete="new-password"/>
      <p class="hint" th:text="'Mindestens ' + ${minPasswordLength} + ' Zeichen.'">Mindestens 8 Zeichen.</p>
    </div>
    <p class="hint" th:if="${!smtpConfigured}">
      SMTP der Einheit ist nicht konfiguriert — Versand per E-Mail nicht möglich (Admin → Einheit → Schnittstellen).
    </p>
  </div>
</th:block>
</html>
