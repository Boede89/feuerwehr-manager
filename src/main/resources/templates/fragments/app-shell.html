<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<body>
<!-- Start App-Shell (eingebettet in Seiten mit th:insert) -->
<th:block th:fragment="shell-start">
<div class="app-shell">
  <header class="app-header">
    <a class="app-header__brand" th:href="@{/(unit=${unitId})}">
      <div class="app-header__emblem" aria-hidden="true">🚒</div>
      <div class="app-header__title">
        <span class="app-header__name">Feuerwehr-Manager</span>
        <span class="app-header__sub" th:if="${currentUnitName != null}" th:text="${currentUnitName}">Einheit</span>
        <span class="app-header__sub" th:unless="${currentUnitName != null}">Feuerwehrverwaltung</span>
      </div>
    </a>
    <div class="app-header__right">
      <div class="btn-group theme-toggle" role="group" aria-label="Design">
        <button type="button" class="btn btn--outline btn--sm" data-theme-choice="light" title="Helles Design">☀️</button>
        <button type="button" class="btn btn--outline btn--sm" data-theme-choice="dark" title="Dunkles Design">🌙</button>
      </div>
      <th:block th:replace="~{fragments/app-header-actions :: actions}"></th:block>
    </div>
  </header>
  <nav class="topnav" aria-label="Hauptnavigation">
    <a class="topnav__item" th:classappend="${activeNav == 'home'} ? ' active' : ''"
       th:href="@{/(unit=${unitId})}">Startseite</a>
    <a class="topnav__item" th:classappend="${activeNav == 'my-area'} ? ' active' : ''"
       th:href="@{/my-area}">Mein Bereich</a>

    <div class="topnav__sep" aria-hidden="true"></div>

    <span class="topnav__item topnav__item--soon" th:if="${navReservierungen == 'soon'}" title="Modul folgt später">Reservierungen</span>
    <a class="topnav__item" th:if="${navPersonal == 'link'}"
       th:classappend="${activeNav == 'personal'} ? ' active' : ''"
       th:href="@{/personal(unit=${unitId})}">Personal</a>
    <a class="topnav__item" th:if="${navAtemschutz == 'link'}"
       th:classappend="${activeNav == 'atemschutz'} ? ' active' : ''"
       th:href="@{/atemschutz(unit=${unitId})}">Atemschutz</a>
    <span class="topnav__item topnav__item--soon" th:if="${navAtemschutz == 'soon'}" title="Modul folgt später">Atemschutz</span>
    <a class="topnav__item" th:if="${navBerichte == 'link'}"
       th:classappend="${activeNav == 'berichte'} ? ' active' : ''"
       th:href="@{/berichte(unit=${unitId})}">Berichte</a>
    <span class="topnav__item topnav__item--soon" th:if="${navBerichte == 'soon'}" title="Modul folgt später">Berichte</span>
    <a class="topnav__item" th:if="${navTermine == 'link'}"
       th:classappend="${activeNav == 'termine'} ? ' active' : ''"
       th:href="@{/termine(unit=${unitId})}">Termine</a>
    <span class="topnav__item topnav__item--soon" th:if="${navTermine == 'soon'}" title="Modul folgt später">Termine</span>
    <a class="topnav__item" th:if="${navEinsatzapp == 'link'}"
       th:classappend="${activeNav == 'einsatzapp'} ? ' active' : ''"
       th:href="@{/einsatzapp(unit=${unitId})}">Einsatz-App</a>
    <span class="topnav__item topnav__item--soon" th:if="${navEinsatzapp == 'soon'}" title="Modul folgt später">Einsatz-App</span>
    <span class="topnav__item topnav__item--soon" th:if="${navAuswertung == 'soon'}" title="Modul folgt später">Auswertung</span>
    <div class="topnav__spacer"></div>
    <a class="topnav__item" th:classappend="${activeNav == 'settings'} ? ' active' : ''"
       th:href="@{/settings(unit=${unitId})}">Einstellungen</a>
    <a class="topnav__item topnav__item--admin" th:if="${isAdmin}"
       th:classappend="${activeNav == 'admin'} ? ' active' : ''"
       th:href="@{/admin(scope='einheit', tab='konfiguration', unit=${unitId})}">Adminpanel</a>
    <a class="topnav__item" th:if="${isAdmin}"
       th:classappend="${activeNav == 'einsatz-manuell'} ? ' active' : ''"
       th:href="@{/einsatz/manuell(unit=${unitId})}">Einsatz anlegen</a>
    <a class="topnav__item topnav__item--test" th:if="${testModeEnabled and isAdmin}"
       th:classappend="${activeNav == 'test-schnittstellen'} ? ' active' : ''"
       th:href="@{/test-schnittstellen(unit=${unitId})}"
       title="Nur Testmodus — rohe DIVERA-API-Antworten">Schnittstellen</a>
    <a class="topnav__item topnav__item--test" th:if="${testModeEnabled and isAdmin}"
       th:classappend="${activeNav == 'test-alarm'} ? ' active' : ''"
       th:href="@{/test-alarm(unit=${unitId})}" title="Nur Testmodus — simuliert DIVERA-Webhooks lokal">Testalarm</a>
  </nav>
  <main class="page-main">
    <div class="page page--active">
</th:block>

<th:block th:fragment="shell-end">
    </div>
  </main>
</div>
<script th:src="@{/js/theme.js}" defer></script>
<script th:src="@{/js/unit-switcher.js}" defer></script>
</th:block>
</body>
</html>
