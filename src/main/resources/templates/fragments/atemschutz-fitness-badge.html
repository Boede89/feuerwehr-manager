<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<th:block th:fragment="badge(view)">
  <span th:if="${view != null and view.level.validityBadgeClass() != ''}"
        th:class="${view.level.validityBadgeClass()}"
        th:text="${view.level.label()}">OK</span>
  <span class="text-muted" th:if="${view != null and view.level.validityBadgeClass() == ''}"
        th:text="${view.level.label()}">Fehlt</span>
  <span class="text-muted" th:if="${view == null}">Fehlt</span>
</th:block>
<th:block th:fragment="validityDate(view)">
  <span class="text-muted" th:if="${view == null or view.validUntil == null}">—</span>
  <span th:if="${view != null and view.validUntil != null}"
        th:class="${view.level.validityBadgeClass()}"
        th:text="${#temporals.format(view.validUntil, 'dd.MM.yyyy')}">01.01.2026</span>
</th:block>
</html>
