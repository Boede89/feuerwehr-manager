<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<th:block th:fragment="badge(view)">
  <span class="fitness-badge" th:if="${view != null}"
        th:classappend="${' ' + view.level.cssClass()}"
        th:text="${view.level.label()}">OK</span>
  <span class="fitness-badge fitness-badge--missing" th:if="${view == null}">Fehlt</span>
</th:block>
<th:block th:fragment="validityDate(view)">
  <span class="validity-date validity-date--missing" th:if="${view == null or view.validUntil == null}">—</span>
  <span class="validity-date" th:if="${view != null and view.validUntil != null}"
        th:classappend="${' ' + view.level.validityDateCssClass()}"
        th:text="${#temporals.format(view.validUntil, 'dd.MM.yyyy')}">01.01.2026</span>
</th:block>
</html>
