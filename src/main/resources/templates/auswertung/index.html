<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout('Auswertung', ~{::main})}">
<main class="auswertung-page">
  <div class="page-header">
    <div>
      <h2>Auswertung</h2>
      <p>Statistiken zu Einsätzen, Diensten und Beteiligung · <strong th:text="${currentUnitName}">—</strong></p>
    </div>
  </div>

  <div th:replace="~{fragments/testmode-banner :: banner}"></div>
  <div th:replace="~{fragments/flash-messages :: alerts}"></div>

  <nav class="tab-bar auswertung-tabs" aria-label="Auswertungsbereiche">
    <a class="tab-btn" th:each="b : ${bereiche}"
       th:classappend="${bereich == b} ? ' tab-btn--active' : ''"
       th:href="@{/auswertung(unit=${unitId}, bereich=${b.key()})}"
       th:text="${b.label()}">Bereich</a>
  </nav>

  <div class="card" style="margin-top:16px;">
    <div class="card__body">
      <p class="hint" style="margin:0;">
        Bereich <strong th:text="${bereich.label()}">Übersicht</strong> — Inhalt folgt.
      </p>
    </div>
  </div>
</main>
</html>
