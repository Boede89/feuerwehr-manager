<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <title>Einheit bearbeiten – Feuerwehr-Manager</title>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<header class="bar">
  <h1>Einheit bearbeiten</h1>
  <a class="link" th:href="@{/settings/units}">← Zurück</a>
</header>
<main>
  <div th:replace="~{fragments/flash-messages :: alerts}"></div>
  <form method="post" th:action="@{/settings/units/{id}(id=${unit.id})}" class="card">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    <label for="name">Name</label>
    <input id="name" name="name" type="text" required maxlength="255" th:value="${unit.name}"/>

    <div class="checkbox-row">
      <input type="hidden" name="active" value="false"/>
      <input id="active" name="active" type="checkbox" value="true" th:checked="${unit.active}"/>
      <label for="active" style="margin:0;font-weight:600;">Einheit ist aktiv (im Dashboard auswählbar)</label>
    </div>
    <p class="hint">Inaktive Einheiten bleiben in der Datenbank, erscheinen aber nicht in der Einheiten-Auswahl.</p>

    <button type="submit" class="btn btn-block">Speichern</button>
  </form>

  <form method="post" th:action="@{/settings/units/{id}/delete(id=${unit.id})}" class="card"
        style="margin-top:1rem;border-color:#fecaca;"
        onsubmit="return confirm('Einheit wirklich löschen? Alle zugehörigen Daten (Personal, Lehrgänge, Divera-Einstellungen) werden unwiderruflich entfernt.');">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
    <h2 style="margin:0 0 0.5rem;font-size:1.05rem;color:#991b1b;">Einheit löschen</h2>
    <p class="hint">Nur möglich, wenn keine Personen mehr erfasst sind (außer im Testmodus für Test-Einheiten).</p>
    <button type="submit" class="btn btn-block" style="background:#dc2626;">Einheit löschen</button>
  </form>
</main>
</body>
</html>
