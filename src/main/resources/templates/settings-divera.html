<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <title>Divera-Einstellungen – Feuerwehr-Manager</title>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<header class="bar">
  <h1>Divera-Einstellungen</h1>
  <a class="link" th:href="@{/settings(unit=${unitId})}">← Einstellungen</a>
</header>
<main>
  <div class="ok" th:if="${saved}">Gespeichert.</div>

  <form method="post" th:action="@{/settings/divera}" class="card">
    <label for="unitSelect">Einheit</label>
    <select id="unitSelect" name="unit" onchange="window.location='/settings/divera?unit='+encodeURIComponent(this.value)">
      <option th:each="u : ${units}"
              th:value="${u.id}"
              th:selected="${u.id == unitId}"
              th:text="${u.name}">Einheit</option>
    </select>
    <p class="hint"><a th:href="@{/settings/units}">Weitere Einheiten anlegen</a></p>

    <label for="apiBaseUrl">API-Basis-URL</label>
    <input id="apiBaseUrl" name="apiBaseUrl" type="url" th:value="${apiBaseUrl}" placeholder="https://app.divera247.com"/>

    <label for="accessKey">Divera Access Key</label>
    <input id="accessKey" name="accessKey" type="password" autocomplete="off" placeholder="Neuen Key eintragen zum Ändern"/>
    <p class="hint" th:if="${accessKeyConfigured}">Key ist hinterlegt. Feld leer lassen = unverändert.</p>
    <p class="hint" th:unless="${accessKeyConfigured}">Key aus Divera 24/7 eintragen und speichern.</p>

    <button type="submit" class="btn btn-block">Speichern</button>
  </form>
</main>
</body>
</html>
