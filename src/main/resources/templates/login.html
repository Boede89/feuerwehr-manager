<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <title>Anmelden – Feuerwehr-Manager</title>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<header class="bar">
  <h1>Feuerwehr-Manager</h1>
</header>
<main>
  <div class="card" style="max-width:420px;margin:2rem auto;">
    <h2 style="margin:0 0 0.5rem;font-size:1.15rem;">Anmelden</h2>
    <p class="hint">Zugang nur für berechtigte Einsatzkräfte.</p>

    <p class="err" th:if="${errorMessage}" th:text="${errorMessage}">Fehler</p>
    <p class="ok" th:if="${infoMessage}" th:text="${infoMessage}">Info</p>

    <form th:action="@{/login}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <label for="username">Benutzername oder E-Mail</label>
      <input id="username" name="username" type="text" autocomplete="username" required autofocus
             placeholder="z. B. m.mustermann oder name@feuerwehr.de"/>
      <label for="password">Passwort</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required/>
      <button type="submit" class="btn btn-block">Anmelden</button>
    </form>

    <p class="hint" style="margin-top:1.25rem;">
      <strong>RFID-Chip (vorbereitet):</strong> Anmeldung per Lesegerät wird später ergänzt.
    </p>
  </div>
</main>
</body>
</html>
