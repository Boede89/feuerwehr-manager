<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Anmelden')}"></head>
<body class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-emblem" aria-hidden="true">🚒</div>
      <h1>Feuerwehr-Manager</h1>
      <p>Zugang für berechtigte Einsatzkräfte</p>
    </div>
    <div class="auth-body">
      <p class="err" th:if="${errorMessage}" th:text="${errorMessage}">Fehler</p>
      <p class="ok" th:if="${infoMessage}" th:text="${infoMessage}">Info</p>

      <form th:action="@{/login}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div class="form-group" style="margin-bottom:16px;">
          <label for="username">Benutzername oder E-Mail</label>
          <input id="username" name="username" type="text" autocomplete="username" required autofocus
                 placeholder="z. B. m.mustermann oder name@feuerwehr.de"/>
        </div>
        <div class="form-group">
          <label for="password">Passwort</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required/>
        </div>
        <button type="submit" class="btn btn-block" style="margin-top:20px;">Anmelden</button>
      </form>

      <p class="hint" style="margin-top:20px;text-align:center;">
        <strong>RFID-Chip (vorbereitet):</strong> Anmeldung per Lesegerät folgt später.
      </p>

      <div class="btn-group" style="justify-content:center;margin-top:20px;" role="group" aria-label="Design">
        <button type="button" class="btn btn--outline btn--sm" data-theme-choice="light">☀️ Hell</button>
        <button type="button" class="btn btn--outline btn--sm" data-theme-choice="dark">🌙 Dunkel</button>
      </div>
    </div>
  </div>
  <script th:src="@{/js/theme.js}" defer></script>
</body>
</html>
