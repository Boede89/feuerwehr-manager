services:
  mysql:
    image: mysql:8.0
    container_name: ffm_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: feuerwehr_manager
      MYSQL_USER: ff
      MYSQL_PASSWORD: ffsecret
      MYSQL_ROOT_PASSWORD: rootsecret
    ports:
      - "3309:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootsecret"]
      interval: 5s
      timeout: 5s
      retries: 30
    volumes:
      - ffm_mysql_data:/var/lib/mysql

  caddy:
    image: caddy:2-alpine
    container_name: ffm_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ffm_caddy_data:/data
      - ffm_caddy_config:/config
    depends_on:
      - app

  app:
    build: .
    container_name: ffm_app
    restart: unless-stopped
    expose:
      - "8080"
    ports:
      # Direktzugriff optional (Debug); Produktiv: https://<Host> über Caddy
      - "8080:8080"
    environment:
      TZ: Europe/Berlin
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: feuerwehr_manager
      MYSQL_USER: ff
      MYSQL_PASSWORD: ffsecret
      FEUERWEHR_DIVERA_POLL_ENABLED: ${FEUERWEHR_DIVERA_POLL_ENABLED:-false}
      FEUERWEHR_BOOTSTRAP_ADMIN_PASSWORD: ${FEUERWEHR_BOOTSTRAP_ADMIN_PASSWORD:-changeme}
      FEUERWEHR_BOOTSTRAP_ADMIN_RESET_PASSWORD: ${FEUERWEHR_BOOTSTRAP_ADMIN_RESET_PASSWORD:-false}
      FEUERWEHR_AUDIT_SALT: ${FEUERWEHR_AUDIT_SALT:-bitte-in-produktion-aendern}
      # DSGVO: 2FA-Secrets verschlüsselt — in Produktion via .env setzen (siehe .env.example)
      FEUERWEHR_TOTP_ENCRYPTION_KEY: ${FEUERWEHR_TOTP_ENCRYPTION_KEY:-}
      FEUERWEHR_DATA_DIR: /data
      FEUERWEHR_SESSION_COOKIE_SECURE: ${FEUERWEHR_SESSION_COOKIE_SECURE:-true}
    volumes:
      - ffm_app_data:/data
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  ffm_mysql_data:
  ffm_app_data:
  ffm_caddy_data:
  ffm_caddy_config:
