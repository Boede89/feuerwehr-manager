services:
  mysql:
    image: mysql:8.0
    container_name: ffm_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: feuerwehr_manager
      MYSQL_USER: ff
      MYSQL_PASSWORD: ffsecret
      MYSQL_ROOT_PASSWORD: rootsecret
    ports:
      - "3309:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootsecret"]
      interval: 5s
      timeout: 5s
      retries: 30
    volumes:
      - ffm_mysql_data:/var/lib/mysql

  caddy:
    image: caddy:2-alpine
    container_name: ffm_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ffm_caddy_data:/data
      - ffm_caddy_config:/config
    depends_on:
      app:
        condition: service_started

  app:
    build: .
    container_name: ffm_app
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    expose:
      - "8080"
    ports:
      # Direktzugriff optional (Debug); Produktiv: https://<Host> über Caddy
      - "8080:8080"
    environment:
      TZ: Europe/Berlin
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: feuerwehr_manager
      MYSQL_USER: ff
      MYSQL_PASSWORD: ffsecret
      FEUERWEHR_DIVERA_POLL_ENABLED: ${FEUERWEHR_DIVERA_POLL_ENABLED:-false}
      FEUERWEHR_BOOTSTRAP_ADMIN_PASSWORD: ${FEUERWEHR_BOOTSTRAP_ADMIN_PASSWORD:-changeme}
      FEUERWEHR_BOOTSTRAP_ADMIN_RESET_PASSWORD: ${FEUERWEHR_BOOTSTRAP_ADMIN_RESET_PASSWORD:-false}
      FEUERWEHR_AUDIT_SALT: ${FEUERWEHR_AUDIT_SALT:-bitte-in-produktion-aendern}
      # DSGVO: 2FA-Secrets verschlüsselt — in Produktion via .env setzen (siehe .env.example)
      FEUERWEHR_TOTP_ENCRYPTION_KEY: ${FEUERWEHR_TOTP_ENCRYPTION_KEY:-}
      FEUERWEHR_DATA_DIR: /data
      FEUERWEHR_SESSION_COOKIE_SECURE: ${FEUERWEHR_SESSION_COOKIE_SECURE:-true}
      # Passwort immer zu CUPS_ADMIN_PASSWORD; CUPS_SERVER nur bei externem CUPS-Server in .env setzen
      CUPS_SERVER: ${CUPS_SERVER:-print:${CUPS_ADMIN_PASSWORD:-print}@cups:631}
      FEUERWEHR_PRINT_RELAY_URL: ${FEUERWEHR_PRINT_RELAY_URL:-http://cups:8766}
    volumes:
      - ffm_app_data:/data
    depends_on:
      mysql:
        condition: service_healthy
      cups:
        condition: service_started

  cups:
    build:
      context: .
      dockerfile: docker/cups/Dockerfile
    container_name: ffm_cups
    restart: unless-stopped
    ports:
      - "631:631"
    expose:
      - "8766"
    environment:
      CUPS_ADMIN_PASSWORD: ${CUPS_ADMIN_PASSWORD:-print}
    volumes:
      - ffm_cups_data:/etc/cups
      # Immer aus dem Repo (Volume würde sonst alte cupsd.conf ohne cups.sock behalten → Web-Login scheitert)
      - ./docker/cups/cupsd.conf:/etc/cups/cupsd.conf:ro
      - ./docker/cups/entrypoint.sh:/entrypoint.sh:ro
      - ./docker/cups/print-relay.py:/print-relay.py:ro

  cups-bootstrap:
    image: debian:bookworm-slim
    container_name: ffm_cups_bootstrap
    restart: "no"
    depends_on:
      cups:
        condition: service_started
    environment:
      CUPS_SERVER: print:${CUPS_ADMIN_PASSWORD:-print}@cups:631
      CUPS_PRINTER_NAME: ${CUPS_PRINTER_NAME:-Zentrale}
      CUPS_PRINTER_URI: ${CUPS_PRINTER_URI:-}
      # Alternative zur URI: nur IP/Hostname (Bootstrap baut ipp://…/ipp/print)
      CUPS_PRINTER_HOST: ${CUPS_PRINTER_HOST:-}
    volumes:
      - ./docker/cups/bootstrap-printer.sh:/bootstrap.sh:ro
    entrypoint: ["/bin/bash", "-c", "apt-get update -qq && apt-get install -y -qq cups-client >/dev/null && bash /bootstrap.sh"]

volumes:
  ffm_mysql_data:
  ffm_app_data:
  ffm_caddy_data:
  ffm_caddy_config:
  ffm_cups_data:
